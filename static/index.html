                                                <span className="rounded-full bg-blue-100 px-3 py-1 text-xs font-medium text-blue-700">{module.class_count} classes</span>
                                                <span className="rounded-full bg-emerald-100 px-3 py-1 text-xs font-medium text-emerald-700">{module.function_count} functions</span>
                                                <span className="rounded-full bg-amber-100 px-3 py-1 text-xs font-medium text-amber-700">{module.import_count} imports</span>
                                            </div>
                                        </div>
                                        <p className="mt-4 text-sm leading-7 text-slate-700">{module.summary || "Summary not available."}</p>
                                        {!module.summary_available && (
                                            <div className="mt-3 rounded-2xl border border-amber-200 bg-amber-50 px-3 py-2 text-xs text-amber-800">
                                                LLM summary was unavailable for this module, so this entry may be more basic than usual.
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            if (step === "kg" || step === "ast") {
                const targetView = step === "ast" ? "ast" : "kg";
                return (
                    <div className="rounded-3xl border border-line bg-white p-8 shadow-soft">
                        <div className="max-w-2xl">
                            <div className="text-xs font-semibold uppercase tracking-[0.16em] text-mute">Architecture Explorer</div>
                            <h3 className="mt-3 text-2xl font-semibold text-slate-900">{targetView === "kg" ? "Knowledge graph" : "Semantic AST"}</h3>
                            <p className="mt-3 text-sm leading-7 text-slate-700">
                                {targetView === "kg"
                                    ? "The knowledge graph is available on the dedicated architecture page so it can use the full width of the screen."
                                    : "The semantic AST is available on the dedicated architecture page so it stays optional and easier to inspect."}
                            </p>
                            <div className="mt-6 flex flex-wrap gap-3">
                                <a href={`/analysis?view=${targetView}`} className="rounded-2xl bg-slate-900 px-5 py-3 text-sm font-medium text-white">
                                    Open {targetView === "kg" ? "Knowledge Graph" : "AST"} Page
                                </a>
                                <a href="/analysis?view=kg" className="rounded-2xl bg-slate-100 px-5 py-3 text-sm font-medium text-slate-700">Open KG</a>
                                <a href="/analysis?view=ast" className="rounded-2xl bg-slate-100 px-5 py-3 text-sm font-medium text-slate-700">Open AST</a>
                            </div>
                        </div>
                    </div>
                );
            }

            if (step === "plan") {
                if (!planItems.length) {
                    return <EmptyState title="Planning view" body="Add requirements on the left to see the generated plan cards." />;
                }
                return (
                    <div className="grid gap-4">
                        {planItems.map((item) => (
                            <PlanCard key={item.id} item={item} selected={selectedRequirementId === item.id} onSelect={onSelectRequirement} />
                        ))}
                    </div>
                );
            }

            if (step === "code") {
                return <CodeViewer item={selectedReviewItem} mode={codeViewMode} onModeChange={setCodeViewMode} />;
            }

            return (
                <ReviewList
                    items={reviewItems.filter((item) => (item.status || "PENDING") === "PENDING")}
                    selectedId={selectedReviewItem?.id}
                    onOpenReview={onOpenReview}
                />
            );
        }

        function App() {
            const folderInputRef = useRef(null);
            const [uploadedSource, setUploadedSource] = useState(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                return saved ? JSON.parse(saved) : null;
            });
            const [requirementsMode, setRequirementsMode] = useState("form");
            const [requirementsText, setRequirementsText] = useState("");
            const [formRequirements, setFormRequirements] = useState(() => [createEmptyRequirement(0)]);
            const [analysisData, setAnalysisData] = useState(null);
            const [reviewItems, setReviewItems] = useState([]);
            const [selectedStep, setSelectedStep] = useState("analyze");
            const [selectedRequirementId, setSelectedRequirementId] = useState(null);
            const [selectedReviewItemId, setSelectedReviewItemId] = useState(null);
            const [codeViewMode, setCodeViewMode] = useState("code");
            const [stageStatus, setStageStatus] = useState({
                analyze: "idle",
                kg: "idle",
                ast: "idle",
                plan: "idle",
                code: "idle",
                review: "idle"
            });
            const [uploading, setUploading] = useState(false);
            const [githubCloneStatus, setGithubCloneStatus] = useState("idle");
            const [sourceMode, setSourceMode] = useState(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (!saved) return "local";
                try {
                    const parsed = JSON.parse(saved);
                    return parsed?.type === "github" ? "github" : "local";
                } catch (error) {
                    return "local";
                }
            });
            const [githubRepoUrl, setGithubRepoUrl] = useState(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (!saved) return "";
                try {
                    const parsed = JSON.parse(saved);
                    return parsed?.repoUrl || "";
                } catch (error) {
                    return "";
                }
            });
            const [githubBranch, setGithubBranch] = useState(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (!saved) return "main";
                try {
                    const parsed = JSON.parse(saved);
                    return parsed?.branch || "main";
                } catch (error) {
                    return "main";
                }
            });
            const [statusMessage, setStatusMessage] = useState("Select a codebase folder and choose a stage.");
            const [errorMessage, setErrorMessage] = useState("");
            const [pipelineLogs, setPipelineLogs] = useState([]);
            const [savingRequirements, setSavingRequirements] = useState(false);
            const [requirementsSaveMessage, setRequirementsSaveMessage] = useState("");
            const [loadingRequirements, setLoadingRequirements] = useState(false);

            const effectiveRequirementsText = useMemo(
                () => requirementsMode === "json" ? requirementsText : serializeFormRequirements(formRequirements),
                [requirementsMode, requirementsText, formRequirements]
            );
            const requirements = useMemo(() => parseRequirements(effectiveRequirementsText), [effectiveRequirementsText]);
            const pendingReviewItems = useMemo(
                () => reviewItems.filter((item) => (item.status || "PENDING") === "PENDING"),
                [reviewItems]
            );
            const selectedReviewItem = useMemo(
                () => pendingReviewItems.find((item) => item.id === selectedReviewItemId) || pendingReviewItems[0] || null,
                [pendingReviewItems, selectedReviewItemId]
            );
            const pendingReviewCount = useMemo(
                () => reviewItems.filter((item) => (item.status || "PENDING") === "PENDING").length,
                [reviewItems]
            );
            const reviewedCount = useMemo(
                () => reviewItems.filter((item) => (item.status || "PENDING") !== "PENDING").length,
                [reviewItems]
            );
            const planItems = useMemo(
                () => requirements.map((requirement) => ({
                    id: requirement.id,
                    requirementId: requirement.id,
                    name: requirement.file_hint || requirement.id,
                    type: requirement.type,
                    reason: requirement.description
                })),
                [requirements]
            );
            const githubCloneMeta = useMemo(() => {
                if (githubCloneStatus === "cloning") return { label: "Cloning", tone: "bg-amber-100 text-amber-700" };
                if (githubCloneStatus === "ready") return { label: "Clone complete", tone: "bg-emerald-100 text-emerald-700" };
                if (githubCloneStatus === "error") return { label: "Clone failed", tone: "bg-rose-100 text-rose-700" };
                if (uploadedSource?.type === "github") return { label: "Pending clone", tone: "bg-slate-100 text-slate-700" };
                return null;
            }, [githubCloneStatus, uploadedSource]);

            useEffect(() => {
                if (folderInputRef.current) {
                    folderInputRef.current.setAttribute("webkitdirectory", "");
                    folderInputRef.current.setAttribute("directory", "");
                }
            }, []);

            useEffect(() => {
                if (uploadedSource) {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(uploadedSource));
                } else {
                    localStorage.removeItem(STORAGE_KEY);
                }
            }, [uploadedSource]);

            useEffect(() => {
                loadRequirementsForSource(uploadedSource);
            }, [uploadedSource]);

            useEffect(() => {
                if (!selectedRequirementId && requirements.length) {
                    setSelectedRequirementId(requirements[0].id);
                }
            }, [requirements, selectedRequirementId]);

            useEffect(() => {
                fetchChanges();
            }, []);

            async function parseJsonResponse(response) {
                const data = await response.json().catch(() => ({}));
                if (!response.ok) {
                    throw new Error(data.error || data.detail || "Request failed");
                }
                return data;
            }

            async function fetchChanges() {
                try {
                    const response = await fetch("/changes");
                    const data = await response.json();
                    setReviewItems(data);
                    const pending = data.filter((item) => (item.status || "PENDING") === "PENDING");
                    if (pending.length) {
                        setSelectedReviewItemId((current) => {
                            if (current && pending.some((item) => item.id === current)) {
                                return current;
                            }
                            return pending[0].id;
                        });
                        setStageStatus((current) => ({ ...current, review: "success" }));
                    } else {
                        setSelectedReviewItemId(null);
                    }
                } catch (error) {
                    setReviewItems([]);
                    setSelectedReviewItemId(null);
                }
            }

            async function loadRequirementsForSource(source = uploadedSource) {
                setLoadingRequirements(true);
                setRequirementsSaveMessage("");
                try {
                    const sourceKey = getSourceKey(source);
                    const response = await fetch(`/requirements/load?source_key=${encodeURIComponent(sourceKey || "")}`);
                    const data = await parseJsonResponse(response);

                    if (data.found) {
                        const rawText = data.raw_text || "";
                        const normalizedItems = parseRequirements(rawText).map((item, index) => normalizeRequirementEntry(item, index));
                        setRequirementsText(rawText);
                        setFormRequirements(normalizedItems.length ? normalizedItems : [createEmptyRequirement(0)]);
                        setRequirementsMode(data.mode === "json" ? "json" : "form");
                        setRequirementsSaveMessage(`Loaded ${data.item_count || normalizedItems.length} saved requirement(s) from DB.`);
                    } else {
                        setRequirementsText("");
                        setFormRequirements([createEmptyRequirement(0)]);
                        setRequirementsMode("form");
                    }
                } catch (error) {
                    setRequirementsText("");
                    setFormRequirements([createEmptyRequirement(0)]);
                    setRequirementsMode("form");
                    setRequirementsSaveMessage("");
                } finally {
                    setLoadingRequirements(false);
                }
            }

            function openAnalysisPage(view = "kg") {
                window.location.href = `/analysis?view=${encodeURIComponent(view === "ast" ? "ast" : "kg")}`;
            }

            function buildCodebaseSourcePayload(source = uploadedSource) {
                if (!source) return null;
                if (source.type === "github") {
                    return {
                        type: "github",
                        repo_url: source.repoUrl,
                        branch: source.branch || "main"
                    };
                }
                return {
                    type: "local",
                    path: source.serverPath
                };
            }

            function getAnalysisCacheKey(source = uploadedSource) {
                if (!source) return "";
                if (source.type === "github") {
                    return `github:${source.repoUrl || ""}#${source.branch || "main"}`;
                }
                return `local:${source.serverPath || ""}`;
            }

            function getSourceKey(source = uploadedSource) {
                if (!source) return "";
                if (source.type === "github") {
                    return `github:${source.repoUrl || ""}#${source.branch || "main"}`;
                }
                return `local:${source.serverPath || ""}`;
            }

            async function activateCodebase(nextSource) {
                const currentKey = getSourceKey(uploadedSource);
                const nextKey = getSourceKey(nextSource);
                const response = await fetch("/codebase/change", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        source_key: nextKey || null,
                        codebase_path: nextSource?.type === "local" ? nextSource.serverPath : null,
                        source_type: nextSource?.type || null,
                        repo_url: nextSource?.repoUrl || null,
                        branch: nextSource?.branch || null
                    })
                });
                const data = await parseJsonResponse(response);

                if (currentKey !== nextKey) {
                    localStorage.removeItem(ANALYSIS_CACHE_KEY);
                    setAnalysisData(null);
                    setPipelineLogs([]);
                    setReviewItems([]);
                    setSelectedReviewItemId(null);
                    setSelectedStep("analyze");
                    setStageStatus({
                        analyze: "idle",
                        kg: "idle",
                        ast: "idle",
                        plan: requirements.length ? "success" : "idle",
                        code: "idle",
                        review: "idle"
                    });
                }

                setUploadedSource(nextSource);
                await fetchChanges();
                return data;
            }

            function switchRequirementsMode(nextMode) {
                if (nextMode === requirementsMode) return;

                if (nextMode === "form") {
                    const parsed = parseRequirements(requirementsText);
                    setFormRequirements(parsed.length
                        ? parsed.map((item, index) => normalizeRequirementEntry(item, index))
                        : [createEmptyRequirement(0)]
                    );
                } else {
                    setRequirementsText(serializeFormRequirements(formRequirements));
                }

                setRequirementsMode(nextMode === "json" ? "json" : "form");
            }

            function updateFormRequirement(index, field, value) {
                setFormRequirements((current) => current.map((item, itemIndex) => (
                    itemIndex === index
                        ? { ...item, [field]: value }
                        : item
                )));
            }

            function addFormRequirement() {
                setFormRequirements((current) => [...current, createEmptyRequirement(current.length)]);
            }

            function removeFormRequirement(index) {
                setFormRequirements((current) => {
                    const next = current.filter((_, itemIndex) => itemIndex !== index);
                    if (!next.length) {
                        return [createEmptyRequirement(0)];
                    }
                    return next.map((item, itemIndex) => ({
                        ...item,
                        id: item.id || `REQ-${itemIndex + 1}`
                    }));
                });
            }

            function openReviewPage(id, mode = "code") {
                setSelectedReviewItemId(id);
                setCodeViewMode(mode);
                setSelectedStep("code");
                window.location.href = `/review?id=${encodeURIComponent(id)}&mode=${encodeURIComponent(mode)}`;
            }

            function openReviewHub() {
                window.location.href = "/review";
            }

            function handleStageNavigation(stepId) {
                if (stepId === "kg" || stepId === "ast") {
                    openAnalysisPage(stepId);
                    return;
                }
                if (stepId === "code" || stepId === "review") {
                    if (selectedReviewItem?.id) {
                        openReviewPage(selectedReviewItem.id, stepId === "review" ? "diff" : "code");
                    } else {
                        openReviewHub();
                    }
                    return;
                }
                setSelectedStep(stepId);
            }

            async function handleFolderChange(event) {
                const files = Array.from(event.target.files || []);
                if (!files.length) return;

                setUploading(true);
                setErrorMessage("");
                setStatusMessage("Uploading selected codebase folder...");

                try {
                    const displayName = files[0].webkitRelativePath ? files[0].webkitRelativePath.split("/")[0] : "Selected folder";
                    const formData = new FormData();
                    files.forEach((file) => {
                        formData.append("files", file, file.webkitRelativePath || file.name);
                    });

                    const response = await fetch("/codebase/upload", {
                        method: "POST",
                        body: formData
                    });
                    const data = await parseJsonResponse(response);
                    const nextSource = {
                        type: "local",
                        displayName,
                        label: data.label || displayName,
                        fileCount: data.file_count || files.length,
                        serverPath: data.path
                    };
                    await activateCodebase(nextSource);
                    setGithubCloneStatus("idle");
                    setStatusMessage(`Codebase ready: ${displayName}`);
                } catch (error) {
                    setErrorMessage(error.message);
                    setStatusMessage("Codebase upload failed.");
                } finally {
                    setUploading(false);
                    event.target.value = "";
                }
            }

            async function handleGithubConnect() {
                const repoUrl = githubRepoUrl.trim();
                const branch = githubBranch.trim() || "main";
                if (!repoUrl) {
                    setErrorMessage("Enter a GitHub repository URL first.");
                    return;
                }

                setErrorMessage("");
                const nextSource = {
                    type: "github",
                    displayName: repoUrl,
                    label: repoUrl.replace(/^https?:\/\/github\.com\//, ""),
                    repoUrl,
                    branch
                };
                await activateCodebase(nextSource);
                setGithubCloneStatus("idle");
                setStatusMessage(`GitHub repo ready: ${repoUrl} (${branch})`);
            }

            async function runAnalyze() {
                const codebaseSource = buildCodebaseSourcePayload();
                if (!codebaseSource) {
                    setErrorMessage("Choose a local folder or connect a GitHub repository before running Analyze.");
                    return;
                }

                setErrorMessage("");
                setSelectedStep("analyze");
                if (codebaseSource.type === "github") {
                    setGithubCloneStatus("cloning");
                    setStatusMessage("Cloning GitHub repo and analyzing codebase...");
                } else {
                    setStatusMessage("Analyzing codebase and building the knowledge graph...");
                }
                setStageStatus((current) => ({ ...current, analyze: "loading", kg: "loading", ast: "loading" }));

                try {
                    const response = await fetch("/analyze-codebase", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            codebase_source: codebaseSource
                        })
                    });
                    const data = await parseJsonResponse(response);
                    setAnalysisData(data);
                    safeWriteAnalysisCache(getAnalysisCacheKey(), data, false);
                    if (codebaseSource.type === "github") {
                        setGithubCloneStatus("ready");
                        setStatusMessage("GitHub clone complete. Analyze completed successfully.");
                    } else {
                        setStatusMessage("Analyze completed successfully.");
                    }
                    setStageStatus((current) => ({ ...current, analyze: "success", kg: "success", ast: "success" }));
                } catch (error) {
                    setErrorMessage(error.message);
                    if (codebaseSource.type === "github") {
                        setGithubCloneStatus("error");
                    }
                    setStageStatus((current) => ({ ...current, analyze: "error", kg: "error", ast: "error" }));
                    setStatusMessage("Analyze failed.");
                }
            }

            async function runPipeline() {
                const codebaseSource = buildCodebaseSourcePayload();
                if (!codebaseSource) {
                    setErrorMessage("Choose a local folder or connect a GitHub repository before running the pipeline.");
                    return;
                }

                setErrorMessage("");
                setSelectedStep("plan");
                if (codebaseSource.type === "github") {
                    setGithubCloneStatus("cloning");
                    setStatusMessage("Cloning GitHub repo and running pipeline...");
                } else {
                    setStatusMessage("Running pipeline from planning to review...");
                }
                setPipelineLogs([]);
                setStageStatus((current) => ({ ...current, plan: "loading", code: "loading", review: "loading" }));

                try {
                    const response = await fetch("/run-pipeline", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            codebase_source: codebaseSource,
                            requirements_text: effectiveRequirementsText || null,
                            requirements_path: "data/reqs.json"
                        })
                    });
                    const data = await parseJsonResponse(response);
                    setPipelineLogs(data.logs || []);
                    if (codebaseSource.type === "github") {
                        setGithubCloneStatus("ready");
                        setStatusMessage("GitHub clone complete. Pipeline finished and review artifacts were stored.");
                    } else {
                        setStatusMessage("Pipeline completed and review artifacts were stored.");
                    }
                    setStageStatus((current) => ({ ...current, plan: "success", code: "success", review: "success" }));
                    await fetchChanges();
                    setSelectedStep("review");
                } catch (error) {
                    setErrorMessage(error.message);
                    if (codebaseSource.type === "github") {
                        setGithubCloneStatus("error");
                    }
                    setPipelineLogs((current) => [...current, `Pipeline error: ${error.message}`]);
                    setStageStatus((current) => ({ ...current, plan: "error", code: "error", review: "error" }));
                    setStatusMessage("Pipeline failed.");
                }
            }

            async function saveRequirementsToDb() {
                setSavingRequirements(true);
                setRequirementsSaveMessage("");
                try {
                    const response = await fetch("/requirements/save", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            raw_text: effectiveRequirementsText,
                            mode: requirementsMode,
                            source_key: getSourceKey(uploadedSource) || null,
                            source_type: uploadedSource?.type || null,
                            source_label: uploadedSource?.label || uploadedSource?.displayName || null
                        })
                    });
                    const data = await parseJsonResponse(response);
                    setRequirementsSaveMessage(data.message || "Requirements saved to database.");
                } catch (error) {
                    setRequirementsSaveMessage(error.message || "Failed to save requirements.");
                } finally {
                    setSavingRequirements(false);
                }
            }

            return (
                <div className="min-h-screen px-6 py-8">
                    <div className="mx-auto max-w-[1600px] space-y-6">
                        <header className="rounded-[32px] border border-line bg-white px-8 py-7 shadow-soft">
                            <div className="flex flex-wrap items-start justify-between gap-6">
                                <div className="max-w-3xl">
                                    <div className="text-xs font-semibold uppercase tracking-[0.2em] text-stageAnalyze">Req-to-Code</div>
                                    <h1 className="mt-3 text-4xl font-semibold tracking-tight text-slate-950">Code Analyzer + Generator + Reviewer</h1>
                                </div>
                                <div className="grid gap-3 sm:min-w-[280px]">
                                    <div className="rounded-2xl border border-line bg-slate-50 px-4 py-3">
                                        <div className="text-xs font-semibold uppercase tracking-[0.16em] text-mute">Selected Codebase</div>
                                        <div className="mt-2 text-sm font-medium text-slate-900">{uploadedSource?.displayName || "No folder selected"}</div>
                                        <div className="mt-1 text-xs text-mute">{uploadedSource ? `${uploadedSource.fileCount} files staged for processing` : "Use the folder picker to begin"}</div>
                                    </div>
                                </div>
                            </div>
                        </header>

                        <input ref={folderInputRef} type="file" multiple className="hidden" onChange={handleFolderChange} />

                        <section className="rounded-[28px] border border-line bg-white p-6 shadow-soft">
                            <div className="flex flex-wrap items-start justify-between gap-4">
                                <div>
                                    <div className="text-xs font-semibold uppercase tracking-[0.16em] text-mute">HITL Review</div>
                                    <h2 className="mt-2 text-2xl font-semibold text-slate-900">Human review queue</h2>
                                    <p className="mt-2 text-sm leading-6 text-mute">
                                        Open the dedicated review page to inspect generated code, compare diffs, and accept or reject changes.
                                    </p>
                                </div>
                                <button type="button" onClick={openReviewHub} className="rounded-2xl bg-slate-900 px-5 py-3 text-sm font-medium text-white">
                                    Open HITL Page
                                </button>
                            </div>
                            <div className="mt-5 grid gap-4 md:grid-cols-4">
                                <div className="rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-4">
                                    <div className="text-xs font-semibold uppercase tracking-[0.14em] text-emerald-700">Pending</div>
                                    <div className="mt-2 text-2xl font-semibold text-emerald-950">{pendingReviewCount}</div>
                                </div>
                                <div className="rounded-2xl border border-teal-200 bg-teal-50 px-4 py-4">
                                    <div className="text-xs font-semibold uppercase tracking-[0.14em] text-teal-700">Reviewed</div>
                                    <div className="mt-2 text-2xl font-semibold text-teal-950">{reviewedCount}</div>
                                </div>
                                <div className="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-4">
                                    <div className="text-xs font-semibold uppercase tracking-[0.14em] text-slate-600">Total attempts</div>
                                    <div className="mt-2 text-2xl font-semibold text-slate-950">{reviewItems.length}</div>
                                </div>
                                <div className="rounded-2xl border border-blue-200 bg-blue-50 px-4 py-4">
                                    <div className="text-xs font-semibold uppercase tracking-[0.14em] text-blue-700">State</div>
                                    <div className="mt-2 text-sm leading-6 text-blue-950">
                                        {reviewItems.length ? "Review page has stored code review items ready." : "Review page is empty until the pipeline creates code for review."}
                                    </div>
                                </div>
                            </div>
                        </section>

                        <div className="grid gap-6 xl:grid-cols-[340px_minmax(0,1fr)_420px]">
                            <aside className="space-y-6">
                                <section className="rounded-[28px] border border-line bg-white p-6 shadow-soft">
                                    <div>
                                        <div className="text-xs font-semibold uppercase tracking-[0.16em] text-mute">Codebase</div>
                                        <h2 className="mt-2 text-xl font-semibold text-slate-900">Choose local folder or GitHub repo</h2>
                                        <p className="mt-2 text-sm leading-6 text-mute">Use the native folder picker for local codebases, or connect a GitHub repository and let the backend clone it for analysis and generation.</p>
                                    </div>
                                    <div className="mt-5 space-y-4">
                                        <div className="flex gap-2 rounded-2xl bg-slate-100 p-1">
                                            <button type="button" onClick={() => setSourceMode("local")} className={classNames("flex-1 rounded-2xl px-3 py-2 text-sm font-medium", sourceMode === "local" ? "bg-white text-slate-900 shadow-sm" : "text-slate-600")}>Local Folder</button>
                                            <button type="button" onClick={() => setSourceMode("github")} className={classNames("flex-1 rounded-2xl px-3 py-2 text-sm font-medium", sourceMode === "github" ? "bg-white text-slate-900 shadow-sm" : "text-slate-600")}>GitHub Repo</button>
                                        </div>

                                        {sourceMode === "local" ? (
                                            <button type="button" disabled={uploading} onClick={() => folderInputRef.current?.click()} className="w-full rounded-2xl bg-slate-900 px-4 py-3 text-sm font-medium text-white">
                                                {uploading ? "Uploading folder..." : "Choose Repo Folder"}
                                            </button>
                                        ) : (
                                            <div className="space-y-3">
                                                <input
                                                    type="url"
                                                    value={githubRepoUrl}
                                                    onChange={(event) => setGithubRepoUrl(event.target.value)}
                                                    placeholder="https://github.com/user/repo"
                                                    className="w-full rounded-2xl border border-line bg-slate-50 px-4 py-3 text-sm outline-none transition focus:border-stageAnalyze focus:bg-white"
                                                />
                                                <input
                                                    type="text"
                                                    value={githubBranch}
                                                    onChange={(event) => setGithubBranch(event.target.value)}
                                                    placeholder="main"
                                                    className="w-full rounded-2xl border border-line bg-slate-50 px-4 py-3 text-sm outline-none transition focus:border-stageAnalyze focus:bg-white"
                                                />
                                                <button type="button" onClick={handleGithubConnect} className="w-full rounded-2xl bg-slate-900 px-4 py-3 text-sm font-medium text-white">
                                                    Use GitHub Repo
                                                </button>
                                            </div>
                                        )}

                                        <div className="rounded-2xl border border-line bg-slate-50 px-4 py-3 text-sm text-slate-700">
                                            <div className="font-medium text-slate-900">{uploadedSource?.label || "No codebase chosen yet"}</div>
                                            <div className="mt-1 text-xs text-mute">
                                                {uploadedSource?.type === "github"
                                                    ? `GitHub branch: ${uploadedSource.branch || "main"}`
                                                    : (uploadedSource?.serverPath || "The selected local folder will be staged automatically for the pipeline.")}
                                            </div>
                                            {githubCloneMeta && (
                                                <div className="mt-3 flex items-center justify-between gap-3">
                                                    <span className="text-[11px] font-semibold uppercase tracking-[0.14em] text-mute">Clone status</span>
                                                    <span className={classNames("rounded-full px-2.5 py-1 text-xs font-medium", githubCloneMeta.tone)}>{githubCloneMeta.label}</span>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </section>

                                <section className="rounded-[28px] border border-line bg-white p-6 shadow-soft">
                                    <div className="flex items-start justify-between gap-4">
                                        <div>
                                            <div className="text-xs font-semibold uppercase tracking-[0.16em] text-mute">Requirements</div>
                                            <h2 className="mt-2 text-xl font-semibold text-slate-900">Readable requirement cards</h2>
                                        </div>
                                        <span className="rounded-full bg-slate-100 px-3 py-1 text-xs font-medium text-slate-700">{requirements.length} items</span>
                                    </div>

                                    <details className="mt-5 rounded-2xl border border-line bg-slate-50 p-4">
                                        <summary className="cursor-pointer text-sm font-medium text-slate-900">
                                            Edit requirement input
                                        </summary>

                                        <div className="mt-4 flex gap-2 rounded-2xl bg-white p-1 shadow-sm ring-1 ring-slate-200">
                                            <button
                                                type="button"
                                                onClick={() => switchRequirementsMode("form")}
                                                className={classNames("flex-1 rounded-2xl px-3 py-2 text-sm font-medium", requirementsMode === "form" ? "bg-slate-900 text-white" : "text-slate-600")}
                                            >
                                                Form
                                            </button>
                                            <button
                                                type="button"
                                                onClick={() => switchRequirementsMode("json")}
                                                className={classNames("flex-1 rounded-2xl px-3 py-2 text-sm font-medium", requirementsMode === "json" ? "bg-slate-900 text-white" : "text-slate-600")}
                                            >
                                                JSON
                                            </button>
                                        </div>

                                        <div className="mt-4 rounded-2xl border border-blue-200 bg-blue-50 px-4 py-3 text-xs leading-6 text-blue-900">
                                            {requirementsMode === "form"
                                                ? "Use the form to add normal text requirements with optional type, ID, and file hint."
                                                : (
                                                    <>
                                                        Supports JSON or normal typed text.
                                                        <br />
                                                        JSON example:{" "}
                                                        <code>
                                                            [{`{"id":"REQ-1","type":"PARTIAL","description":"Add search","file_hint":"app.py"}`}]
                                                        </code>
                                                        <br />
                                                    </>
                                                )}
                                        </div>

                                        {requirementsMode === "form" ? (
                                            <div className="mt-4 space-y-3">
                                                {formRequirements.map((requirement, index) => (
                                                    <div key={`${requirement.id}-${index}`} className="rounded-2xl border border-line bg-white p-4">
                                                        <div className="grid gap-3">
                                                            <div className="grid gap-3 sm:grid-cols-[1fr_130px]">
                                                                <input
                                                                    type="text"
                                                                    value={requirement.id}
                                                                    onChange={(event) => updateFormRequirement(index, "id", event.target.value)}
                                                                    placeholder={`REQ-${index + 1}`}
                                                                    className="w-full rounded-2xl border border-line bg-slate-50 px-4 py-3 text-sm outline-none transition focus:border-stageAnalyze focus:bg-white"
                                                                />
                                                                <select
                                                                    value={requirement.type}
                                                                    onChange={(event) => updateFormRequirement(index, "type", event.target.value)}
                                                                    className="w-full rounded-2xl border border-line bg-slate-50 px-4 py-3 text-sm outline-none transition focus:border-stageAnalyze focus:bg-white"
                                                                >
                                                                    <option value="FIT">FIT</option>
                                                                    <option value="PARTIAL">PARTIAL</option>
                                                                    <option value="GAP">GAP</option>
                                                                </select>
                                                            </div>
                                                            <textarea
                                                                value={requirement.description}
                                                                onChange={(event) => updateFormRequirement(index, "description", event.target.value)}
                                                                placeholder="Describe the requirement in normal text."
                                                                className="min-h-[96px] w-full rounded-2xl border border-line bg-slate-50 px-4 py-3 text-sm leading-6 outline-none transition focus:border-stageAnalyze focus:bg-white"
                                                            />
                                                            <div className="grid gap-3 sm:grid-cols-[1fr_auto]">
                                                                <input
                                                                    type="text"
                                                                    value={requirement.file_hint}
                                                                    onChange={(event) => updateFormRequirement(index, "file_hint", event.target.value)}
                                                                    placeholder="Optional file hint, for example app.py"
                                                                    className="w-full rounded-2xl border border-line bg-slate-50 px-4 py-3 text-sm outline-none transition focus:border-stageAnalyze focus:bg-white"
                                                                />
                                                                <button
                                                                    type="button"
                                                                    onClick={() => removeFormRequirement(index)}
                                                                    className="rounded-2xl bg-rose-50 px-4 py-3 text-sm font-medium text-rose-700"
                                                                >
                                                                    Remove
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}

                                                <button
                                                    type="button"
                                                    onClick={addFormRequirement}
                                                    className="w-full rounded-2xl border border-dashed border-line bg-white px-4 py-3 text-sm font-medium text-slate-700 hover:border-slate-300 hover:bg-slate-50"
                                                >
                                                    Add requirement
                                                </button>
                                            </div>
                                        ) : (
                                            <textarea
                                                value={requirementsText}
                                                onChange={(event) => setRequirementsText(event.target.value)}
                                                className="mt-4 min-h-[180px] w-full rounded-2xl border border-line bg-white px-4 py-3 text-sm leading-6 outline-none transition focus:border-stageAnalyze"
                                            />
                                        )}

                                        <div className="mt-4 flex flex-wrap items-center gap-3">
                                            <button
                                                type="button"
                                                disabled={savingRequirements || !requirements.length}
                                                onClick={saveRequirementsToDb}
                                                className="rounded-2xl bg-slate-900 px-4 py-3 text-sm font-medium text-white disabled:cursor-not-allowed disabled:opacity-60"
                                            >
                                                {savingRequirements ? "Saving..." : "Save To DB"}
                                            </button>
                                            {requirementsSaveMessage && (
                                                <div className="text-sm text-slate-700">{requirementsSaveMessage}</div>
                                            )}
                                        </div>
                                    </details>

                                    <div className="mt-5 space-y-3">
                                        {requirements.length ? requirements.map((requirement) => (
                                            <RequirementCard key={requirement.id} requirement={requirement} selected={selectedRequirementId === requirement.id} onSelect={setSelectedRequirementId} />
                                        )) : (
                                            <EmptyState title="No requirements parsed" body="Paste JSON or pipe-delimited requirements and preview them here as cards." />
                                        )}
                                    </div>
                                </section>
                            </aside>
                            <main className="space-y-6">
                                <section className="rounded-[28px] border border-line bg-white p-6 shadow-soft">
                                    <div className="flex flex-wrap items-start justify-between gap-5">
                                        <div>
                                            <div className="text-xs font-semibold uppercase tracking-[0.16em] text-mute">Actions</div>
                                            <h2 className="mt-2 text-2xl font-semibold text-slate-900">Analyze or run the pipeline</h2>
                                            <p className="mt-2 text-sm leading-6 text-mute">Use Analyze for summaries and architecture data, then Run Pipeline to generate code and send it into HITL review.</p>
                                        </div>
                                        <div className="flex flex-wrap gap-3">
                                            <button type="button" onClick={runAnalyze} className="rounded-2xl bg-stageAnalyze px-5 py-3 text-sm font-medium text-white">Run Analyze</button>
                                            <button type="button" onClick={runPipeline} className="rounded-2xl bg-slate-900 px-5 py-3 text-sm font-medium text-white">Run Pipeline</button>
                                            <button type="button" onClick={() => openAnalysisPage("kg")} className="rounded-2xl bg-slate-100 px-5 py-3 text-sm font-medium text-slate-700">Open Architecture</button>
                                        </div>
                                    </div>
                                </section>

                                <section className="rounded-[28px] border border-line bg-white p-6 shadow-soft">
                                    <div className="mb-4 flex items-center justify-between gap-4">
                                        <div>
                                            <div className="text-xs font-semibold uppercase tracking-[0.16em] text-mute">Output Viewer</div>
                                            <h2 className="mt-1 text-2xl font-semibold text-slate-900">{STAGES.find((step) => step.id === selectedStep)?.label} output</h2>
                                        </div>
                                    </div>
                                    <OutputViewer
                                        step={selectedStep}
                                        analysisData={analysisData}
                                        planItems={planItems}
                                        selectedRequirementId={selectedRequirementId}
                                        onSelectRequirement={setSelectedRequirementId}
                                        reviewItems={pendingReviewItems}
                                        selectedReviewItem={selectedReviewItem}
                                        codeViewMode={codeViewMode}
                                        setCodeViewMode={setCodeViewMode}
                                        onOpenReview={openReviewPage}
                                    />
                                </section>
                            </main>

                            <aside className="space-y-6">
                                <section className="rounded-[28px] border border-line bg-white p-6 shadow-soft">
                                    <div className="text-xs font-semibold uppercase tracking-[0.16em] text-mute">Live feedback</div>
                                    <h2 className="mt-2 text-xl font-semibold text-slate-900">System messages</h2>
                                    {errorMessage ? (
                                        <button type="button" onClick={() => selectedReviewItem?.id ? openReviewPage(selectedReviewItem.id, "code") : openReviewHub()} className="mt-4 w-full rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-left text-sm text-rose-700 hover:border-rose-300">
                                            {errorMessage}
                                        </button>
                                    ) : (
                                        <button type="button" onClick={() => pendingReviewCount ? openReviewHub() : handleStageNavigation(selectedStep)} className="mt-4 w-full rounded-2xl border border-line bg-slate-50 px-4 py-3 text-left text-sm text-slate-700 hover:border-slate-300 hover:bg-white">
                                            {statusMessage}
                                        </button>
                                    )}
                                    <div className="mt-4 space-y-3">
                                        {STAGES.map((stage) => {
                                            const meta = getStatusMeta(stageStatus[stage.id]);
                                            return (
                                                <button
                                                    key={stage.id}
                                                    type="button"
                                                    onClick={() => handleStageNavigation(stage.id)}
                                                    className="flex w-full items-center justify-between rounded-2xl border border-line bg-slate-50 px-4 py-3 text-left hover:border-slate-300 hover:bg-white"
                                                >
                                                    <span className="text-sm font-medium text-slate-900">{stage.label}</span>
                                                    <span className={classNames("inline-flex shrink-0 whitespace-nowrap rounded-full px-2.5 py-1 text-xs font-medium", meta.tone)}>{meta.label}</span>
                                                </button>
                                            );
                                        })}
                                    </div>
                                </section>

                                <section className="rounded-[28px] border border-line bg-white p-6 shadow-soft">
                                    <div className="text-xs font-semibold uppercase tracking-[0.16em] text-mute">Pipeline Log</div>
                                    <h2 className="mt-2 text-xl font-semibold text-slate-900">Execution details</h2>
                                    <div className="mt-4 overflow-hidden rounded-3xl border border-slate-900 bg-slate-950">
                                        <pre className="max-h-[420px] overflow-auto px-4 py-4 text-xs leading-6 text-slate-200">{pipelineLogs.length ? pipelineLogs.join("\n") : "Logs will appear here after you run the pipeline."}</pre>
                                    </div>
                                </section>
                            </aside>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>

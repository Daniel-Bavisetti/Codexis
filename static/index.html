<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Req-to-Code</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        panel: "#ffffff",
                        base: "#f4f6fb",
                        ink: "#0f172a",
                        mute: "#64748b",
                        line: "#dbe4f0",
                        stageAnalyze: "#2563eb",
                        stageKg: "#7c3aed",
                        stageAst: "#ea580c",
                        stagePlan: "#16a34a",
                        stageCode: "#111827",
                        stageReview: "#0f766e"
                    },
                    boxShadow: {
                        soft: "0 20px 45px rgba(15, 23, 42, 0.08)"
                    }
                }
            }
        };
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <style>
        body { background: linear-gradient(180deg, #f7f9fc 0%, #eef3f8 100%); }
        .stage-line {
            background: linear-gradient(90deg, #c7d2fe 0%, #d8b4fe 25%, #fdba74 50%, #86efac 75%, #99f6e4 100%);
        }
        .editor-shell {
            background:
                radial-gradient(circle at top left, rgba(59, 130, 246, 0.12), transparent 28%),
                linear-gradient(180deg, #111827 0%, #0f172a 100%);
        }
        .editor-toolbar {
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.96) 0%, rgba(15, 23, 42, 0.96) 100%);
        }
        .code-scroll pre[class*="language-"] {
            margin: 0;
            background: transparent;
            border-radius: 0;
            min-height: 260px;
            padding: 1.5rem 1.75rem 1.75rem;
            overflow: auto;
            font-family: "Cascadia Code", "Cascadia Mono", "JetBrains Mono", Consolas, "SFMono-Regular", Menlo, Monaco, monospace;
            font-size: 14px;
            line-height: 1.75;
            letter-spacing: -0.01em;
            tab-size: 4;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }
        .code-scroll code[class*="language-"] {
            font-family: inherit;
            white-space: pre;
        }
        .code-scroll .token.comment,
        .code-scroll .token.prolog,
        .code-scroll .token.doctype,
        .code-scroll .token.cdata {
            color: #94a3b8;
        }
        .code-scroll .token.punctuation {
            color: #cbd5e1;
        }
        .code-scroll .token.property,
        .code-scroll .token.tag,
        .code-scroll .token.boolean,
        .code-scroll .token.number,
        .code-scroll .token.constant,
        .code-scroll .token.symbol,
        .code-scroll .token.deleted {
            color: #fda4af;
        }
        .code-scroll .token.selector,
        .code-scroll .token.attr-name,
        .code-scroll .token.string,
        .code-scroll .token.char,
        .code-scroll .token.builtin,
        .code-scroll .token.inserted {
            color: #86efac;
        }
        .code-scroll .token.operator,
        .code-scroll .token.entity,
        .code-scroll .token.url,
        .code-scroll .language-css .token.string,
        .code-scroll .style .token.string {
            color: #fcd34d;
            background: transparent;
        }
        .code-scroll .token.atrule,
        .code-scroll .token.attr-value,
        .code-scroll .token.keyword {
            color: #93c5fd;
        }
        .code-scroll .token.function,
        .code-scroll .token.class-name {
            color: #c4b5fd;
        }
        .code-scroll .token.regex,
        .code-scroll .token.important,
        .code-scroll .token.variable {
            color: #fdba74;
        }
        .code-scroll .token.important,
        .code-scroll .token.bold {
            font-weight: 700;
        }
    </style>
</head>
<body class="min-h-screen text-ink">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-clike.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
    <script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>

    <script type="text/babel">
        const { useEffect, useMemo, useRef, useState } = React;

        const STAGES = [
            { id: "analyze", label: "Analyze", color: "bg-stageAnalyze", ring: "ring-stageAnalyze/20", text: "text-stageAnalyze" },
            { id: "kg", label: "KG", color: "bg-stageKg", ring: "ring-stageKg/20", text: "text-stageKg" },
            { id: "ast", label: "AST", color: "bg-stageAst", ring: "ring-stageAst/20", text: "text-stageAst" },
            { id: "plan", label: "Plan", color: "bg-stagePlan", ring: "ring-stagePlan/20", text: "text-stagePlan" },
            { id: "code", label: "Code", color: "bg-stageCode", ring: "ring-slate-300", text: "text-slate-900" },
            { id: "review", label: "Review", color: "bg-stageReview", ring: "ring-stageReview/20", text: "text-stageReview" }
        ];

        const STORAGE_KEY = "req_to_code_uploaded_codebase";
        const ANALYSIS_CACHE_KEY = "req_to_code_analysis_cache";

        function classNames(...values) {
            return values.filter(Boolean).join(" ");
        }

        function parseRequirements(rawText) {
            const text = (rawText || "").trim();
            if (!text) return [];

            try {
                const parsed = JSON.parse(text);
                if (Array.isArray(parsed)) {
                    return parsed.map((item, index) => ({
                        id: item.id || `REQ-${index + 1}`,
                        type: (item.type || "PARTIAL").toUpperCase(),
                        description: item.description || "",
                        file_hint: item.file_hint || "Not specified"
                    }));
                }
                if (parsed && typeof parsed === "object") {
                    const items = [];
                    ["FIT", "PARTIAL", "GAP"].forEach((type) => {
                        (parsed[type] || []).forEach((item, index) => {
                            items.push({
                                id: item.id || `${type}-${index + 1}`,
                                type,
                                description: item.description || "",
                                file_hint: item.file_hint || "Not specified"
                            });
                        });
                    });
                    return items;
                }
            } catch (error) {
                return text
                    .split("\n")
                    .map((line) => line.trim())
                    .filter(Boolean)
                    .map((line, index) => {
                        const parts = line.split("|").map((part) => part.trim());
                        let type = "PARTIAL";
                        let description = line;
                        let fileHint = "Not specified";

                        if (parts.length >= 3) {
                            [type, description, fileHint] = parts;
                        } else if (parts.length === 2) {
                            if (["FIT", "PARTIAL", "GAP"].includes(parts[0].toUpperCase())) {
                                [type, description] = parts;
                            } else {
                                [description, fileHint] = parts;
                            }
                        } else if (line.includes(":")) {
                            const [maybeType, rest] = line.split(/:(.+)/).map((part) => part.trim());
                            if (["FIT", "PARTIAL", "GAP"].includes((maybeType || "").toUpperCase()) && rest) {
                                type = maybeType;
                                description = rest;
                            }
                        }

                        return {
                            id: `REQ-${index + 1}`,
                            type: type.toUpperCase(),
                            description,
                            file_hint: fileHint
                        };
                    });
            }

            return [];
        }

        function normalizeRequirementEntry(requirement = {}, index = 0) {
            return {
                id: requirement.id || `REQ-${index + 1}`,
                type: (requirement.type || "PARTIAL").toUpperCase(),
                description: requirement.description || "",
                file_hint: requirement.file_hint || ""
            };
        }

        function createEmptyRequirement(index = 0) {
            return {
                id: `REQ-${index + 1}`,
                type: "PARTIAL",
                description: "",
                file_hint: ""
            };
        }

        function serializeFormRequirements(items = []) {
            const normalized = items
                .map((item, index) => normalizeRequirementEntry(item, index))
                .filter((item) => item.description.trim() || item.file_hint.trim() || item.id.trim());

            return JSON.stringify(
                normalized.map((item, index) => ({
                    id: item.id.trim() || `REQ-${index + 1}`,
                    type: item.type || "PARTIAL",
                    description: item.description.trim(),
                    file_hint: item.file_hint.trim() || "Not specified"
                })),
                null,
                2
            );
        }

        function getStatusMeta(status) {
            if (status === "loading") return { label: "Loading", tone: "bg-amber-100 text-amber-700" };
            if (status === "success") return { label: "Success", tone: "bg-emerald-100 text-emerald-700" };
            if (status === "error") return { label: "Error", tone: "bg-rose-100 text-rose-700" };
            return { label: "Idle", tone: "bg-slate-100 text-slate-600" };
        }

        function getCodeLanguage(filePath = "") {
            const normalized = filePath.toLowerCase();
            if (normalized.endsWith(".py")) return "python";
            if (normalized.endsWith(".js") || normalized.endsWith(".ts") || normalized.endsWith(".tsx") || normalized.endsWith(".jsx")) return "javascript";
            if (normalized.endsWith(".json")) return "json";
            if (normalized.endsWith(".html") || normalized.endsWith(".xml")) return "markup";
            return "clike";
        }

        function sanitizeCodeDisplay(content = "") {
            return String(content || "")
                .replace(/\u00A0/g, " ")
                .replace(/\u200B/g, "")
                .replace(/\u2018|\u2019/g, "'")
                .replace(/\u201C|\u201D/g, '"')
                .replace(/\u2013|\u2014|\u2212/g, "-")
                .replace(/\u2264/g, "<=")
                .replace(/\u2265/g, ">=")
                .replace(/\u00D7/g, "*")
                .replace(/\u00F7/g, "/");
        }

        function buildAnalysisCachePayload(sourceKey, data, includeArchitecture = false) {
            if (!data) return null;
            return {
                sourceKey,
                data: includeArchitecture ? data : {
                    overall_summary: data.overall_summary || "",
                    module_summaries: Array.isArray(data.module_summaries) ? data.module_summaries : [],
                    graph_stats: data.graph_stats || {},
                    files: Array.isArray(data.files) ? data.files : []
                }
            };
        }

        function safeWriteAnalysisCache(sourceKey, data, includeArchitecture = false) {
            const payload = buildAnalysisCachePayload(sourceKey, data, includeArchitecture);
            if (!payload) return false;
            try {
                localStorage.setItem(ANALYSIS_CACHE_KEY, JSON.stringify(payload));
                return true;
            } catch (error) {
                console.warn("Analysis cache write skipped:", error);
                try {
                    localStorage.removeItem(ANALYSIS_CACHE_KEY);
                } catch (removeError) {
                    console.warn("Analysis cache cleanup skipped:", removeError);
                }
                return false;
            }
        }

        function normalizeDisplayPath(value = "") {
            const normalized = String(value || "").replaceAll("\\", "/");
            if (!normalized) return "Unknown";

            if (normalized.includes("data/codebase/")) {
                return normalized.split("data/codebase/")[1];
            }

            const parts = normalized.split("/").filter(Boolean);
            const tempIndex = parts.findIndex((part) => part.startsWith("req-to-code-upload-") || part.startsWith("req-to-code-"));
            if (tempIndex >= 0 && tempIndex + 1 < parts.length) {
                return parts.slice(tempIndex + 1).join("/");
            }

            return normalized;
        }

        function getStageAccent(stepId) {
            if (stepId === "analyze") return "#2563eb";
            if (stepId === "kg") return "#7c3aed";
            if (stepId === "ast") return "#ea580c";
            if (stepId === "plan") return "#16a34a";
            if (stepId === "code") return "#111827";
            return "#0f766e";
        }

        function shortenPath(value = "", segments = 2) {
            const normalized = normalizeDisplayPath(value);
            const parts = normalized.split("/").filter(Boolean);
            if (parts.length <= segments) return normalized || "Unknown";
            return parts.slice(-segments).join("/");
        }

        function truncateLabel(value = "", maxLength = 28) {
            const text = String(value || "");
            if (text.length <= maxLength) return text;
            return `${text.slice(0, Math.max(0, maxLength - 3))}...`;
        }

        function formatGraphNodeLabel(node) {
            if (!node) return "Unknown";
            if (node.type === "file") {
                return truncateLabel(shortenPath(node.path || node.name || node.id, 2), 30);
            }
            return truncateLabel(node.qualname || node.name || node.path || node.id, 26);
        }

        function formatGraphNodeMeta(node) {
            if (!node) return "";
            if (node.type === "file") return normalizeDisplayPath(node.path || "");
            return node.path ? shortenPath(node.path, 3) : "";
        }

        function getModuleSummaries(analysisData) {
            if (Array.isArray(analysisData?.module_summaries) && analysisData.module_summaries.length) {
                return analysisData.module_summaries;
            }

            return (analysisData?.semantic_ast || []).map((module) => ({
                path: normalizeDisplayPath(module.path || module.name || "Unknown module"),
                summary: module.summary || "Summary not available.",
                class_count: (module.classes || []).length,
                function_count: (module.functions || []).length,
                import_count: (module.imports || []).length,
                summary_available: !String(module.summary || "").startsWith("LLM summary unavailable"),
            }));
        }

        function buildGraphViewModel(graph) {
            const sourceNodes = Array.isArray(graph?.nodes) ? graph.nodes : [];
            const sourceEdges = Array.isArray(graph?.edges) ? graph.edges : [];

            if (!sourceNodes.length) {
                return {
                    nodes: [],
                    edges: [],
                    files: [],
                    nodeLookup: new Map(),
                    relationsByNode: new Map(),
                    stats: {
                        shownNodes: 0,
                        shownEdges: 0,
                        fileCount: 0,
                        classCount: 0,
                        functionCount: 0,
                        hiddenImports: 0,
                        hiddenVariables: 0
                    }
                };
            }

            const allowedNodeTypes = new Set(["file", "class", "function"]);
            const allowedEdgeTypes = new Set(["DEFINES", "CALLS", "INHERITS"]);
            const nodeLookup = new Map(sourceNodes.map((node) => [node.id, node]));
            const relationScore = new Map();
            const fileChildren = new Map();
            const hiddenImports = sourceNodes.filter((node) => node.type === "import").length;
            const hiddenVariables = sourceNodes.filter((node) => node.type === "variable").length;

            sourceEdges.forEach((edge) => {
                if (!allowedEdgeTypes.has(edge.type)) return;
                relationScore.set(edge.from, (relationScore.get(edge.from) || 0) + 1);
                relationScore.set(edge.to, (relationScore.get(edge.to) || 0) + 1);

                const fromNode = nodeLookup.get(edge.from);
                const toNode = nodeLookup.get(edge.to);
                if (edge.type === "DEFINES" && fromNode?.type === "file" && (toNode?.type === "class" || toNode?.type === "function")) {
                    const children = fileChildren.get(edge.from) || [];
                    children.push(edge.to);
                    fileChildren.set(edge.from, children);
                }
            });

            const rankedFiles = sourceNodes
                .filter((node) => node.type === "file")
                .map((node) => ({
                    ...node,
                    score: (fileChildren.get(node.id) || []).length * 3 + (relationScore.get(node.id) || 0)
                }))
                .sort((left, right) => right.score - left.score || String(left.path || left.id).localeCompare(String(right.path || right.id)))
                .slice(0, 10);

            const selectedNodeIds = new Set(rankedFiles.map((node) => node.id));

            rankedFiles.forEach((fileNode) => {
                const children = (fileChildren.get(fileNode.id) || [])
                    .map((childId) => nodeLookup.get(childId))
                    .filter(Boolean)
                    .sort((left, right) => {
                        const leftPriority = left.type === "class" ? 0 : 1;
                        const rightPriority = right.type === "class" ? 0 : 1;
                        if (leftPriority !== rightPriority) return leftPriority - rightPriority;
                        return (relationScore.get(right.id) || 0) - (relationScore.get(left.id) || 0);
                    })
                    .slice(0, 7);

                children.forEach((child) => selectedNodeIds.add(child.id));
            });

            const filteredNodes = sourceNodes
                .filter((node) => allowedNodeTypes.has(node.type) && selectedNodeIds.has(node.id))
                .map((node) => ({
                    ...node,
                    label: formatGraphNodeLabel(node),
                    displayLabel: node.type === "function" ? "" : formatGraphNodeLabel(node),
                    metaLabel: formatGraphNodeMeta(node),
                    relationCount: relationScore.get(node.id) || 0
                }));

            const filteredNodeLookup = new Map(filteredNodes.map((node) => [node.id, node]));

            const filteredEdges = sourceEdges
                .filter((edge) => allowedEdgeTypes.has(edge.type) && filteredNodeLookup.has(edge.from) && filteredNodeLookup.has(edge.to))
                .map((edge, index) => ({
                    id: `edge-${index}`,
                    source: edge.from,
                    target: edge.to,
                    type: edge.type
                }));

            const relationsByNode = new Map();
            filteredEdges.forEach((edge) => {
                const sourceNode = filteredNodeLookup.get(edge.source);
                const targetNode = filteredNodeLookup.get(edge.target);
                if (!sourceNode || !targetNode) return;

                const sourceRelations = relationsByNode.get(edge.source) || [];
                sourceRelations.push({
                    direction: "out",
                    type: edge.type,
                    nodeId: edge.target,
                    label: targetNode.label,
                    nodeType: targetNode.type
                });
                relationsByNode.set(edge.source, sourceRelations);

                const targetRelations = relationsByNode.get(edge.target) || [];
                targetRelations.push({
                    direction: "in",
                    type: edge.type,
                    nodeId: edge.source,
                    label: sourceNode.label,
                    nodeType: sourceNode.type
                });
                relationsByNode.set(edge.target, targetRelations);
            });

            return {
                nodes: filteredNodes,
                edges: filteredEdges,
                files: rankedFiles.map((node) => filteredNodeLookup.get(node.id)).filter(Boolean),
                nodeLookup: filteredNodeLookup,
                relationsByNode,
                stats: {
                    shownNodes: filteredNodes.length,
                    shownEdges: filteredEdges.length,
                    fileCount: filteredNodes.filter((node) => node.type === "file").length,
                    classCount: filteredNodes.filter((node) => node.type === "class").length,
                    functionCount: filteredNodes.filter((node) => node.type === "function").length,
                    hiddenImports,
                    hiddenVariables
                }
            };
        }

        function EmptyState({ title, body }) {
            return (
                <div className="rounded-3xl border border-dashed border-line bg-white p-8 text-center shadow-soft">
                    <h3 className="text-lg font-semibold text-slate-900">{title}</h3>
                    <p className="mt-2 text-sm leading-6 text-mute">{body}</p>
                </div>
            );
        }

        function RequirementCard({ requirement, onSelect, selected }) {
            const tone = requirement.type === "FIT"
                ? "bg-blue-50 text-blue-700 border-blue-200"
                : requirement.type === "GAP"
                    ? "bg-amber-50 text-amber-700 border-amber-200"
                    : "bg-emerald-50 text-emerald-700 border-emerald-200";

            return (
                <button
                    type="button"
                    onClick={() => onSelect(requirement.id)}
                    className={classNames(
                        "w-full rounded-2xl border p-4 text-left transition hover:border-slate-300 hover:bg-slate-50",
                        selected ? "border-slate-900 bg-slate-50" : "border-line bg-white"
                    )}
                >
                    <div className="mb-3 flex items-start justify-between gap-3">
                        <div className="min-w-0 flex-1">
                            <div className="text-xs font-semibold uppercase tracking-[0.16em] text-mute">{requirement.id}</div>
                            <div className="mt-1 break-all text-sm text-mute">{requirement.file_hint}</div>
                        </div>
                        <span className={classNames("inline-flex shrink-0 whitespace-nowrap rounded-full border px-2.5 py-1 text-xs font-semibold", tone)}>{requirement.type}</span>
                    </div>
                    <p className="text-sm leading-6 text-slate-700">{requirement.description}</p>
                </button>
            );
        }

        function PipelineStep({ step, status, selected, onSelect }) {
            const meta = getStatusMeta(status);
            return (
                <button
                    type="button"
                    onClick={() => onSelect(step.id)}
                    className={classNames(
                        "relative z-10 flex min-h-[148px] w-full min-w-0 flex-col items-center justify-center gap-3 rounded-2xl border bg-white px-3 py-4 text-center shadow-soft transition hover:-translate-y-0.5",
                        selected ? `border-transparent ring-4 ${step.ring}` : "border-line"
                    )}
                >
                    <span className={classNames("flex h-10 w-10 items-center justify-center rounded-full text-sm font-semibold text-white", step.color)}>{step.label}</span>
                    <div>
                        <div className={classNames("text-sm font-semibold", step.text)}>{step.label}</div>
                        <span className={classNames("mt-2 inline-flex rounded-full px-2.5 py-1 text-xs font-medium", meta.tone)}>{meta.label}</span>
                    </div>
                </button>
            );
        }

        function PipelineOverview({ steps, statuses, selectedStep, onSelect }) {
            const containerRef = useRef(null);
            const nodeRefs = useRef({});
            const [lines, setLines] = useState([]);

            useEffect(() => {
                function updateLines() {
                    const container = containerRef.current;
                    if (!container) return;

                    const containerRect = container.getBoundingClientRect();
                    const nextLines = [];

                    steps.forEach((step, index) => {
                        if (index === steps.length - 1) return;

                        const fromNode = nodeRefs.current[step.id];
                        const toNode = nodeRefs.current[steps[index + 1].id];
                        if (!fromNode || !toNode) return;

                        const fromRect = fromNode.getBoundingClientRect();
                        const toRect = toNode.getBoundingClientRect();
                        const x1 = fromRect.left - containerRect.left + (fromRect.width / 2);
                        const y1 = fromRect.top - containerRect.top + (fromRect.height / 2);
                        const x2 = toRect.left - containerRect.left + (toRect.width / 2);
                        const y2 = toRect.top - containerRect.top + (toRect.height / 2);
                        const delta = Math.max(28, Math.abs(x2 - x1) * 0.35);
                        const c1x = x1 < x2 ? x1 + delta : x1 - delta;
                        const c2x = x1 < x2 ? x2 - delta : x2 + delta;

                        nextLines.push({
                            id: `${step.id}-${steps[index + 1].id}`,
                            x1,
                            y1,
                            x2,
                            y2,
                            c1x,
                            c2x,
                            stroke: getStageAccent(steps[index + 1].id)
                        });
                    });

                    setLines(nextLines);
                }

                updateLines();

                const observer = typeof ResizeObserver !== "undefined" ? new ResizeObserver(updateLines) : null;
                if (observer) {
                    if (containerRef.current) observer.observe(containerRef.current);
                    steps.forEach((step) => {
                        const node = nodeRefs.current[step.id];
                        if (node) observer.observe(node);
                    });
                }

                window.addEventListener("resize", updateLines);

                return () => {
                    window.removeEventListener("resize", updateLines);
                    if (observer) observer.disconnect();
                };
            }, [steps, selectedStep, statuses]);

            return (
                <div ref={containerRef} className="relative mt-8">
                    <svg className="pointer-events-none absolute inset-0 h-full w-full" aria-hidden="true">
                        {lines.map((line) => (
                            <g key={line.id}>
                                <path
                                    d={`M ${line.x1} ${line.y1} C ${line.c1x} ${line.y1}, ${line.c2x} ${line.y2}, ${line.x2} ${line.y2}`}
                                    fill="none"
                                    stroke={line.stroke}
                                    strokeWidth="3"
                                    strokeLinecap="round"
                                    opacity="0.42"
                                />
                                <circle cx={line.x2} cy={line.y2} r="4" fill={line.stroke} opacity="0.7" />
                            </g>
                        ))}
                    </svg>

                    <div
                        className="relative z-10 grid gap-4"
                        style={{ gridTemplateColumns: "repeat(auto-fit, minmax(132px, 1fr))" }}
                    >
                        {steps.map((step, index) => (
                            <div
                                key={step.id}
                                ref={(node) => {
                                    if (node) {
                                        nodeRefs.current[step.id] = node;
                                    } else {
                                        delete nodeRefs.current[step.id];
                                    }
                                }}
                                className="min-w-0"
                            >
                                <PipelineStep step={step} status={statuses[step.id]} selected={selectedStep === step.id} onSelect={onSelect} />

                                    <div className="mt-2 text-center text-[11px] font-medium uppercase tracking-[0.12em] text-slate-400">
                                        {step.label} to {steps[index + 1].label}
                                    </div>
                                ) : (
                                    <div className="mt-2 text-center text-[11px] font-medium uppercase tracking-[0.12em] text-slate-300">
                                        Final stage
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function ProgressFeed({ statuses }) {
            const items = [
                { id: "analyze", text: "Analyze completed" },
                { id: "kg", text: "KG generated" },
                { id: "ast", text: "AST prepared" },
                { id: "plan", text: "Planning" },
                { id: "code", text: "Code generated" },
                { id: "review", text: "Stored for review" }
            ];

            return (
                <div className="rounded-3xl border border-line bg-white p-5 shadow-soft">
                    <div className="mb-4 text-sm font-semibold text-slate-900">Execution progress</div>
                    <div className="space-y-3">
                        {items.map((item) => {
                            const status = statuses[item.id] || "idle";
                            const icon = status === "success" ? "OK" : status === "loading" ? "..." : status === "error" ? "!" : "o";
                            const tone = status === "success" ? "text-emerald-700" : status === "loading" ? "text-amber-600" : status === "error" ? "text-rose-700" : "text-slate-500";
                            return (
                                <div key={item.id} className={classNames("flex items-center gap-3 text-sm", tone)}>
                                    <span className="inline-flex h-6 w-6 items-center justify-center rounded-full bg-slate-100 text-xs font-semibold">{icon}</span>
                                    <span>{item.text}</span>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        function GraphViewer({ graph }) {
            const containerRef = useRef(null);
            const cyRef = useRef(null);
            const viewModel = useMemo(() => buildGraphViewModel(graph), [graph]);
            const [selectedNodeId, setSelectedNodeId] = useState(null);

            useEffect(() => {
                if (!viewModel.nodes.length) {
                    setSelectedNodeId(null);
                    return;
                }
                setSelectedNodeId((current) => {
                    if (current && viewModel.nodeLookup.has(current)) return current;
                    return viewModel.files[0]?.id || viewModel.nodes[0]?.id || null;
                });
            }, [viewModel]);

            useEffect(() => {
                if (!containerRef.current || !window.cytoscape || !viewModel.nodes.length) return undefined;

                const cy = window.cytoscape({
                    container: containerRef.current,
                    elements: [
                        ...viewModel.nodes.map((node) => ({
                            data: {
                                id: node.id,
                                label: node.displayLabel,
                                fullLabel: node.label,
                                metaLabel: node.metaLabel,
                                type: node.type,
                                relationCount: node.relationCount
                            }
                        })),
                        ...viewModel.edges.map((edge) => ({
                            data: {
                                id: edge.id,
                                source: edge.source,
                                target: edge.target,
                                edgeType: edge.type
                            }
                        }))
                    ],
                    layout: {
                        name: "breadthfirst",
                        animate: false,
                        fit: true,
                        directed: true,
                        padding: 28,
                        spacingFactor: 1.35,
                        roots: viewModel.files.map((node) => node.id)
                    },
                    style: [
                        {
                            selector: "node",
                            style: {
                                label: "data(label)",
                                "font-size": 11,
                                color: "#0f172a",
                                "text-wrap": "wrap",
                                "text-max-width": 120,
                                "text-valign": "center",
                                "text-halign": "center",
                                "border-width": 2,
                                "border-color": "#cbd5e1",
                                "background-color": "#e2e8f0",
                                width: 48,
                                height: 48
                            }
                        },
                        {
                            selector: 'node[type = "file"]',
                            style: {
                                shape: "round-rectangle",
                                width: 180,
                                height: 66,
                                "background-color": "#dbeafe",
                                "border-color": "#60a5fa",
                                "font-size": 12,
                                "font-weight": 700,
                                color: "#1e3a8a",
                                "text-max-width": 150
                            }
                        },
                        {
                            selector: 'node[type = "class"]',
                            style: {
                                shape: "round-rectangle",
                                width: 132,
                                height: 48,
                                "background-color": "#ede9fe",
                                "border-color": "#8b5cf6",
                                color: "#5b21b6"
                            }
                        },
                        {
                            selector: 'node[type = "function"]',
                            style: {
                                shape: "ellipse",
                                width: 24,
                                height: 24,
                                "background-color": "#fed7aa",
                                "border-color": "#f97316",
                                label: ""
                            }
                        },
                        {
                            selector: "node:selected",
                            style: {
                                "border-width": 4,
                                "border-color": "#0f172a"
                            }
                        },
                        {
                            selector: "edge",
                            style: {
                                width: 2.2,
                                "line-color": "#cbd5e1",
                                "target-arrow-color": "#cbd5e1",
                                "target-arrow-shape": "triangle",
                                "curve-style": "taxi",
                                "taxi-direction": "downward",
                                opacity: 0.9
                            }
                        },
                        {
                            selector: 'edge[edgeType = "DEFINES"]',
                            style: {
                                "line-color": "#94a3b8",
                                "target-arrow-color": "#94a3b8"
                            }
                        },
                        {
                            selector: 'edge[edgeType = "CALLS"]',
                            style: {
                                width: 2.6,
                                "line-color": "#c084fc",
                                "target-arrow-color": "#c084fc"
                            }
                        },
                        {
                            selector: 'edge[edgeType = "INHERITS"]',
                            style: {
                                width: 2.6,
                                "line-style": "dashed",
                                "line-color": "#34d399",
                                "target-arrow-color": "#34d399"
                            }
                        }
                    ]
                });

                cy.on("tap", "node", (event) => {
                    setSelectedNodeId(event.target.id());
                });

                cyRef.current = cy;

                return () => {
                    cyRef.current = null;
                    cy.destroy();
                };
            }, [viewModel]);

            useEffect(() => {
                if (!cyRef.current || !selectedNodeId) return;
                cyRef.current.elements().unselect();
                const node = cyRef.current.$id(selectedNodeId);
                if (node.length) {
                    node.select();
                    cyRef.current.center(node);
                }
            }, [selectedNodeId]);

            if (!(graph?.nodes || []).length) {
                return <EmptyState title="Knowledge graph not available" body="Run Analyze to build the graph, then inspect dependencies and relationships here." />;
            }

            const selectedNode = selectedNodeId ? viewModel.nodeLookup.get(selectedNodeId) : null;
            const selectedRelations = selectedNodeId ? (viewModel.relationsByNode.get(selectedNodeId) || []) : [];

            return (
                <div className="space-y-4">
                    <div className="grid gap-3 md:grid-cols-4">
                        <div className="rounded-2xl border border-blue-200 bg-blue-50 px-4 py-3">
                            <div className="text-xs font-semibold uppercase tracking-[0.14em] text-blue-700">Files</div>
                            <div className="mt-2 text-2xl font-semibold text-blue-950">{viewModel.stats.fileCount}</div>
                        </div>
                        <div className="rounded-2xl border border-violet-200 bg-violet-50 px-4 py-3">
                            <div className="text-xs font-semibold uppercase tracking-[0.14em] text-violet-700">Classes</div>
                            <div className="mt-2 text-2xl font-semibold text-violet-950">{viewModel.stats.classCount}</div>
                        </div>
                        <div className="rounded-2xl border border-orange-200 bg-orange-50 px-4 py-3">
                            <div className="text-xs font-semibold uppercase tracking-[0.14em] text-orange-700">Functions</div>
                            <div className="mt-2 text-2xl font-semibold text-orange-950">{viewModel.stats.functionCount}</div>
                        </div>
                        <div className="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3">
                            <div className="text-xs font-semibold uppercase tracking-[0.14em] text-slate-600">Focused View</div>
                            <div className="mt-2 text-sm leading-6 text-slate-700">
                                Showing {viewModel.stats.shownNodes} nodes and {viewModel.stats.shownEdges} relationships.
                            </div>
                        </div>
                    </div>

                    <div className="rounded-3xl border border-line bg-white p-5 shadow-soft">
                        <div className="flex flex-wrap gap-2">
                            {viewModel.files.map((file) => (
                                <button
                                    key={file.id}
                                    type="button"
                                    onClick={() => setSelectedNodeId(file.id)}
                                    className={classNames(
                                        "rounded-full border px-3 py-1.5 text-sm transition",
                                        selectedNodeId === file.id ? "border-blue-600 bg-blue-600 text-white" : "border-blue-200 bg-blue-50 text-blue-800 hover:border-blue-300"
                                    )}
                                >
                                    {file.label}
                                </button>
                            ))}
                        </div>
                        <p className="mt-4 text-sm leading-6 text-mute">
                            This architecture view hides {viewModel.stats.hiddenImports} import node(s) and {viewModel.stats.hiddenVariables} variable node(s) so the graph stays readable.
                        </p>
                    </div>

                    <div ref={containerRef} className="h-[680px] w-full rounded-3xl border border-line bg-slate-50 shadow-soft" />

                    <div className="grid gap-4 lg:grid-cols-[260px_minmax(0,1fr)]">
                        <div className="rounded-3xl border border-line bg-white p-5 shadow-soft">
                            <div className="text-xs font-semibold uppercase tracking-[0.16em] text-mute">Legend</div>
                            <div className="mt-4 space-y-3 text-sm text-slate-700">
                                <div className="flex items-center gap-3">
                                    <span className="h-4 w-7 rounded-md border border-blue-400 bg-blue-200" />
                                    <span>Files</span>
                                </div>
                                <div className="flex items-center gap-3">
                                    <span className="h-4 w-7 rounded-md border border-violet-500 bg-violet-200" />
                                    <span>Classes</span>
                                </div>
                                <div className="flex items-center gap-3">
                                    <span className="h-4 w-4 rounded-full border border-orange-500 bg-orange-200" />
                                    <span>Functions</span>
                                </div>
                            </div>
                        </div>

                        <div className="rounded-3xl border border-line bg-white p-5 shadow-soft">
                            <div className="text-xs font-semibold uppercase tracking-[0.16em] text-mute">Selection</div>
                            {selectedNode ? (
                                <div className="mt-4 space-y-4">
                                    <div>
                                        <div className="text-lg font-semibold text-slate-900">{selectedNode.label}</div>
                                        <div className="mt-1 text-sm text-mute">{selectedNode.metaLabel || "No path metadata available."}</div>
                                    </div>
                                    <div className="flex flex-wrap gap-2">
                                        <span className="rounded-full bg-slate-100 px-3 py-1 text-xs font-medium uppercase tracking-[0.14em] text-slate-700">{selectedNode.type}</span>
                                        <span className="rounded-full bg-slate-100 px-3 py-1 text-xs font-medium text-slate-700">{selectedRelations.length} linked nodes</span>
                                    </div>
                                    <div className="grid gap-2 md:grid-cols-2">
                                        {selectedRelations.slice(0, 8).map((relation, index) => (
                                            <button
                                                key={`${relation.nodeId}-${index}`}
                                                type="button"
                                                onClick={() => setSelectedNodeId(relation.nodeId)}
                                                className="flex w-full items-center justify-between rounded-2xl border border-line bg-slate-50 px-3 py-2 text-left text-sm hover:border-slate-300 hover:bg-white"
                                            >
                                                <span className="truncate text-slate-700">{relation.label}</span>
                                                <span className="ml-3 rounded-full bg-white px-2 py-1 text-[11px] font-semibold uppercase tracking-[0.12em] text-slate-500">
                                                    {relation.type}
                                                </span>
                                            </button>
                                        ))}
                                        {!selectedRelations.length && (
                                            <p className="text-sm text-mute">No visible relationships for this node in the focused architecture view.</p>
                                        )}
                                    </div>
                                </div>
                            ) : (
                                <p className="mt-4 text-sm text-mute">Select a file, class, or function to inspect its visible relationships.</p>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function AstNode({ label, value, depth = 0 }) {
            if (Array.isArray(value)) {
                return (
                    <details className="rounded-xl border border-line bg-white p-3">
                        <summary className="cursor-pointer text-sm font-medium text-slate-800">{label} ({value.length})</summary>
                        <div className="mt-3 space-y-2 pl-4">
                            {value.map((item, index) => (
                                <AstNode key={`${label}-${index}`} label={`${label.slice(0, -1) || "item"} ${index + 1}`} value={item} depth={depth + 1} />
                            ))}
                        </div>
                    </details>
                );
            }

            if (value && typeof value === "object") {
                return (
                    <details className="rounded-xl border border-line bg-white p-3" open={depth === 0}>
                        <summary className="cursor-pointer text-sm font-medium text-slate-800">{label}</summary>
                        <div className="mt-3 space-y-2 pl-4">
                            {Object.entries(value).map(([key, nestedValue]) => (
                                <AstNode key={`${label}-${key}`} label={key} value={nestedValue} depth={depth + 1} />
                            ))}
                        </div>
                    </details>
                );
            }

            return (
                <div className="rounded-xl border border-line bg-white px-3 py-2 text-sm text-slate-700">
                    <span className="font-medium text-slate-900">{label}:</span> {String(value ?? "None")}
                </div>
            );
        }

        function PlanCard({ item, selected, onSelect }) {
            return (
                <button
                    type="button"
                    onClick={() => onSelect(item.id)}
                    className={classNames(
                        "w-full rounded-2xl border p-4 text-left transition hover:border-emerald-300 hover:bg-emerald-50/40",
                        selected ? "border-emerald-400 bg-emerald-50" : "border-line bg-white"
                    )}
                >
                    <div className="flex items-center justify-between gap-3">
                        <div>
                            <div className="text-sm font-semibold text-slate-900">{item.name}</div>
                            <div className="mt-1 text-xs uppercase tracking-[0.12em] text-emerald-700">{item.type}</div>
                        </div>
                        <span className="rounded-full bg-emerald-100 px-2.5 py-1 text-xs font-medium text-emerald-700">{item.requirementId}</span>
                    </div>
                    <p className="mt-3 text-sm leading-6 text-slate-600">{item.reason}</p>
                </button>
            );
        }

        function CodeViewer({ item, mode, onModeChange }) {
            const codeRef = useRef(null);
            const language = getCodeLanguage(item?.file_path || "");
            const rawContent = mode === "diff" ? item?.diff : item?.generated_code;
            const content = useMemo(() => sanitizeCodeDisplay(rawContent), [rawContent]);

            useEffect(() => {
                if (codeRef.current && window.Prism) {
                    window.Prism.highlightAllUnder(codeRef.current);
                }
            }, [content, language, mode]);

            if (!item) {
                return <EmptyState title="No generated code yet" body="Run the pipeline to generate code, then inspect the produced source and diff here." />;
            }

            return (
                <div className="space-y-4">
                    <div className="rounded-3xl border border-line bg-white p-5 shadow-soft">
                        <div className="flex flex-wrap items-center justify-between gap-3">
                            <div>
                                <h3 className="text-lg font-semibold text-slate-900">{item.file_path || "Generated code"}</h3>
                                <p className="mt-1 text-sm text-mute">Traceability: sourced from {item.requirement_id || "the selected requirement"}.</p>
                            </div>
                            <div className="flex gap-2">
                                <button type="button" onClick={() => onModeChange("code")} className={classNames("rounded-full px-4 py-2 text-sm font-medium", mode === "code" ? "bg-slate-900 text-white" : "bg-slate-100 text-slate-700")}>View Code</button>
                                <button type="button" onClick={() => onModeChange("diff")} className={classNames("rounded-full px-4 py-2 text-sm font-medium", mode === "diff" ? "bg-slate-900 text-white" : "bg-slate-100 text-slate-700")}>View Diff</button>
                            </div>
                        </div>
                    </div>

                    <div ref={codeRef} className="code-scroll overflow-hidden rounded-3xl border border-slate-900 bg-slate-950 shadow-soft">
                        <div className="editor-shell overflow-hidden rounded-3xl">
                            <div className="editor-toolbar flex items-center justify-between border-b border-slate-700 px-5 py-3 text-sm text-slate-300">
                                <div className="flex items-center gap-3">
                                    <div className="flex items-center gap-1.5">
                                        <span className="h-2.5 w-2.5 rounded-full bg-rose-400"></span>
                                        <span className="h-2.5 w-2.5 rounded-full bg-amber-300"></span>
                                        <span className="h-2.5 w-2.5 rounded-full bg-emerald-400"></span>
                                    </div>
                                    <span className="rounded-full border border-slate-600 bg-slate-800/70 px-2.5 py-1 text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-200">
                                        {mode === "diff" ? "Diff" : language}
                                    </span>
                                </div>
                                <span className="truncate pl-4 text-slate-400">{item.file_path || "output"}</span>
                            </div>
                            <div className="flex items-center justify-between border-b border-slate-800/80 px-5 py-2 text-xs text-slate-400">
                                <span>{mode === "diff" ? "Unified diff" : "Generated source"}</span>
                                <span>{content.split("\n").length} lines</span>
                            </div>
                            <pre className={`language-${mode === "diff" ? "clike" : language}`}><code className={`language-${mode === "diff" ? "clike" : language}`}>{content || "No content available."}</code></pre>
                        </div>
                    </div>
                </div>
            );
        }

        function ReviewList({ items, selectedId, onOpenReview }) {
            if (!items.length) {
                return <EmptyState title="Review queue is empty" body="Generated code will appear here after the pipeline stores it for HITL review." />;
            }

            return (
                <div className="space-y-4">
                    {items.map((item) => {
                        const selected = item.id === selectedId;
                        const displayPath = shortenPath(item.file_path || "Unknown file", 3);
                        return (
                            <div key={item.id} className={classNames("rounded-3xl border p-5 shadow-soft", selected ? "border-stageReview bg-teal-50/40" : "border-line bg-white")}>
                                <div className="flex flex-wrap items-start justify-between gap-3">
                                    <div className="min-w-0 flex-1">
                                        <div className="text-xs font-semibold uppercase tracking-[0.16em] text-slate-500">{item.requirement_id || "Requirement"}</div>
                                        <h3 className="mt-2 break-words text-lg font-semibold text-slate-900">{displayPath}</h3>
                                        <p className="mt-2 text-sm text-slate-700">{item.confidence_explanation || "Stored for human review."}</p>
                                    </div>
                                    <span className="inline-flex shrink-0 whitespace-nowrap rounded-full bg-slate-100 px-3 py-1 text-xs font-medium text-slate-700">{item.status || "PENDING"}</span>
                                </div>

                                <div className="mt-4 flex flex-wrap gap-2">
                                    <button type="button" onClick={() => onOpenReview(item.id, "code")} className="rounded-full bg-slate-900 px-4 py-2 text-sm font-medium text-white">View Code</button>

                                </div>
                            </div>

                    })}
                </div>

                step,
                analysisData,
                planItems,
                selectedRequirementId,
                onSelectRequirement,
                reviewItems,
                selectedReviewItem,
                codeViewMode,
                setCodeViewMode,
                onOpenReview
            } = props;

            if (step === "analyze") {
                if (!analysisData) {
                    return <EmptyState title="Analyze output" body="Run Analyze to see the codebase summary and module list." />;
                }
                const moduleSummaries = getModuleSummaries(analysisData);
                return (
                    <div className="space-y-4">
                        <div className="rounded-3xl border border-line bg-white p-6 shadow-soft">
                            <div className="flex flex-wrap items-start justify-between gap-4">
                                <div>
                                    <h3 className="text-lg font-semibold text-slate-900">Codebase overview</h3>
                                    <p className="mt-3 max-w-3xl text-sm leading-7 text-slate-700">{analysisData.overall_summary || "No summary available."}</p>
                                </div>
                                <div className="grid min-w-[240px] grid-cols-3 gap-3">
                                    <div className="rounded-2xl border border-blue-200 bg-blue-50 px-4 py-3">
                                        <div className="text-xs font-semibold uppercase tracking-[0.14em] text-blue-700">Modules</div>
                                        <div className="mt-2 text-2xl font-semibold text-blue-950">{analysisData.graph_stats?.files || moduleSummaries.length}</div>
                                    </div>
                                    <div className="rounded-2xl border border-violet-200 bg-violet-50 px-4 py-3">
                                        <div className="text-xs font-semibold uppercase tracking-[0.14em] text-violet-700">Classes</div>
                                        <div className="mt-2 text-2xl font-semibold text-violet-950">{analysisData.graph_stats?.classes || 0}</div>
                                    </div>
                                    <div className="rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-3">
                                        <div className="text-xs font-semibold uppercase tracking-[0.14em] text-emerald-700">Functions</div>
                                        <div className="mt-2 text-2xl font-semibold text-emerald-950">{analysisData.graph_stats?.functions || 0}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div className="rounded-3xl border border-line bg-white p-6 shadow-soft">
                            <div className="flex flex-wrap items-center justify-between gap-3">
                                <h3 className="text-lg font-semibold text-slate-900">Module summaries</h3>
                                <span className="rounded-full bg-slate-100 px-3 py-1 text-xs font-medium text-slate-700">{moduleSummaries.length} modules</span>
                            </div>
                            <div className="mt-4 grid gap-4">
                                {moduleSummaries.slice(0, 16).map((module) => (

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Req-to-Code Architecture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        panel: "#ffffff",
                        base: "#f4f6fb",
                        ink: "#0f172a",
                        mute: "#64748b",
                        line: "#dbe4f0",
                        stageKg: "#7c3aed",
                        stageAst: "#ea580c"
                    },
                    boxShadow: {
                        soft: "0 20px 45px rgba(15, 23, 42, 0.08)"
                    }
                }
            }
        };
    </script>
    <script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background: linear-gradient(180deg, #f7f9fc 0%, #eef3f8 100%); }
    </style>
</head>
<body class="min-h-screen text-ink">
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect, useMemo, useRef, useState } = React;

        const STORAGE_KEY = "req_to_code_uploaded_codebase";
        const ANALYSIS_CACHE_KEY = "req_to_code_analysis_cache";

        function classNames(...values) {
            return values.filter(Boolean).join(" ");
        }

        function normalizeDisplayPath(value = "") {
            const normalized = String(value || "").replaceAll("\\", "/");
            if (!normalized) return "Unknown";

            if (normalized.includes("data/codebase/")) {
                return normalized.split("data/codebase/")[1];
            }

            const parts = normalized.split("/").filter(Boolean);
            const tempIndex = parts.findIndex((part) => part.startsWith("req-to-code-upload-") || part.startsWith("req-to-code-"));
            if (tempIndex >= 0 && tempIndex + 1 < parts.length) {
                return parts.slice(tempIndex + 1).join("/");
            }

            return normalized;
        }

        function shortenPath(value = "", segments = 2) {
            const normalized = normalizeDisplayPath(value);
            const parts = normalized.split("/").filter(Boolean);
            if (parts.length <= segments) return normalized || "Unknown";
            return parts.slice(-segments).join("/");
        }

        function truncateLabel(value = "", maxLength = 28) {
            const text = String(value || "");
            if (text.length <= maxLength) return text;
            return `${text.slice(0, Math.max(0, maxLength - 3))}...`;
        }

        function formatGraphNodeLabel(node) {
            if (!node) return "Unknown";
            if (node.type === "file") {
                return truncateLabel(shortenPath(node.path || node.name || node.id, 2), 30);
            }
            return truncateLabel(node.qualname || node.name || node.path || node.id, 26);
        }

        function formatGraphNodeMeta(node) {
            if (!node) return "";
            if (node.type === "file") return normalizeDisplayPath(node.path || "");
            return node.path ? shortenPath(node.path, 3) : "";
        }

        function hasArchitectureData(data) {
            return Boolean(
                Array.isArray(data?.semantic_ast) && data.semantic_ast.length
            ) || Boolean(
                Array.isArray(data?.knowledge_graph?.nodes) && data.knowledge_graph.nodes.length
            );
        }

        function buildAnalysisCachePayload(sourceKey, data, includeArchitecture = true) {
            if (!data) return null;
            return {
                sourceKey,
                data: includeArchitecture ? data : {
                    overall_summary: data.overall_summary || "",
                    module_summaries: Array.isArray(data.module_summaries) ? data.module_summaries : [],
                    graph_stats: data.graph_stats || {},
                    files: Array.isArray(data.files) ? data.files : []
                }
            };
        }

        function safeWriteAnalysisCache(sourceKey, data, includeArchitecture = true) {
            const payload = buildAnalysisCachePayload(sourceKey, data, includeArchitecture);
            if (!payload) return false;
            try {
                localStorage.setItem(ANALYSIS_CACHE_KEY, JSON.stringify(payload));
                return true;
            } catch (error) {
                console.warn("Analysis cache write skipped:", error);
                try {
                    localStorage.removeItem(ANALYSIS_CACHE_KEY);
                } catch (removeError) {
                    console.warn("Analysis cache cleanup skipped:", removeError);
                }
                return false;
            }
        }

        function buildGraphViewModel(graph) {
            const sourceNodes = Array.isArray(graph?.nodes) ? graph.nodes : [];
            const sourceEdges = Array.isArray(graph?.edges) ? graph.edges : [];

            if (!sourceNodes.length) {
                return {
                    nodes: [],
                    edges: [],
                    files: [],
                    nodeLookup: new Map(),
                    relationsByNode: new Map(),
                    stats: {
                        shownNodes: 0,
                        shownEdges: 0,
                        fileCount: 0,
                        classCount: 0,
                        functionCount: 0,
                        hiddenImports: 0,
                        hiddenVariables: 0
                    }
                };
            }

            const allowedNodeTypes = new Set(["file", "class", "function"]);
            const allowedEdgeTypes = new Set(["DEFINES", "CALLS", "INHERITS"]);
            const nodeLookup = new Map(sourceNodes.map((node) => [node.id, node]));
            const relationScore = new Map();
            const fileChildren = new Map();
            const hiddenImports = sourceNodes.filter((node) => node.type === "import").length;
            const hiddenVariables = sourceNodes.filter((node) => node.type === "variable").length;

            sourceEdges.forEach((edge) => {
                if (!allowedEdgeTypes.has(edge.type)) return;
                relationScore.set(edge.from, (relationScore.get(edge.from) || 0) + 1);
                relationScore.set(edge.to, (relationScore.get(edge.to) || 0) + 1);

                const fromNode = nodeLookup.get(edge.from);
                const toNode = nodeLookup.get(edge.to);
                if (edge.type === "DEFINES" && fromNode?.type === "file" && (toNode?.type === "class" || toNode?.type === "function")) {
                    const children = fileChildren.get(edge.from) || [];
                    children.push(edge.to);
                    fileChildren.set(edge.from, children);
                }
            });

            const rankedFiles = sourceNodes
                .filter((node) => node.type === "file")
                .map((node) => ({
                    ...node,
                    score: (fileChildren.get(node.id) || []).length * 3 + (relationScore.get(node.id) || 0)
                }))
                .sort((left, right) => right.score - left.score || String(left.path || left.id).localeCompare(String(right.path || right.id)))
                .slice(0, 10);

            const selectedNodeIds = new Set(rankedFiles.map((node) => node.id));

            const fileGroups = [];

            rankedFiles.forEach((fileNode) => {
                const children = (fileChildren.get(fileNode.id) || [])
                    .map((childId) => nodeLookup.get(childId))
                    .filter(Boolean)
                    .sort((left, right) => {
                        const leftPriority = left.type === "class" ? 0 : 1;
                        const rightPriority = right.type === "class" ? 0 : 1;
                        if (leftPriority !== rightPriority) return leftPriority - rightPriority;
                        return (relationScore.get(right.id) || 0) - (relationScore.get(left.id) || 0);
                    })
                    .slice(0, 7);

                children.forEach((child) => selectedNodeIds.add(child.id));
                fileGroups.push({
                    fileId: fileNode.id,
                    childIds: children.map((child) => child.id)
                });
            });

            const filteredNodes = sourceNodes
                .filter((node) => allowedNodeTypes.has(node.type) && selectedNodeIds.has(node.id))
                .map((node) => ({
                    ...node,
                    label: formatGraphNodeLabel(node),
                    displayLabel: formatGraphNodeLabel(node),
                    metaLabel: formatGraphNodeMeta(node),
                    relationCount: relationScore.get(node.id) || 0
                }));

            const filteredNodeLookup = new Map(filteredNodes.map((node) => [node.id, node]));

            const filteredEdges = sourceEdges
                .filter((edge) => allowedEdgeTypes.has(edge.type) && filteredNodeLookup.has(edge.from) && filteredNodeLookup.has(edge.to))
                .map((edge, index) => ({
                    id: `edge-${index}`,
                    source: edge.from,
                    target: edge.to,
                    type: edge.type
                }));

            const relationsByNode = new Map();
            filteredEdges.forEach((edge) => {
                const sourceNode = filteredNodeLookup.get(edge.source);
                const targetNode = filteredNodeLookup.get(edge.target);
                if (!sourceNode || !targetNode) return;

                const sourceRelations = relationsByNode.get(edge.source) || [];
                sourceRelations.push({ direction: "out", type: edge.type, nodeId: edge.target, label: targetNode.label });
                relationsByNode.set(edge.source, sourceRelations);

                const targetRelations = relationsByNode.get(edge.target) || [];
                targetRelations.push({ direction: "in", type: edge.type, nodeId: edge.source, label: sourceNode.label });
                relationsByNode.set(edge.target, targetRelations);
            });

            return {
                nodes: filteredNodes,
                edges: filteredEdges,
                files: rankedFiles.map((node) => filteredNodeLookup.get(node.id)).filter(Boolean),
                fileGroups,
                nodeLookup: filteredNodeLookup,
                relationsByNode,
                stats: {
                    shownNodes: filteredNodes.length,
                    shownEdges: filteredEdges.length,
                    fileCount: filteredNodes.filter((node) => node.type === "file").length,
                    classCount: filteredNodes.filter((node) => node.type === "class").length,
                    functionCount: filteredNodes.filter((node) => node.type === "function").length,
                    hiddenImports,
                    hiddenVariables
                }
            };
        }

        function buildGraphLayout(viewModel, viewportWidth = 1500) {
            const positions = {};
            const groups = viewModel.fileGroups || [];
            const marginX = 108;
            const marginY = 88;
            const clusterGap = 72;
            const rowGap = 96;
            const fileWidth = 240;
            const fileHeight = 82;
            const classWidth = 168;
            const classHeight = 56;
            const functionWidth = 144;
            const functionHeight = 44;
            const cardGap = 30;
            const availableWidth = Math.max(920, viewportWidth - (marginX * 2));
            let cursorX = marginX;
            let cursorY = marginY;
            let rowBottom = marginY;

            groups.forEach((group) => {
                const fileNode = viewModel.nodeLookup.get(group.fileId);
                if (!fileNode) return;

                const children = group.childIds
                    .map((childId) => viewModel.nodeLookup.get(childId))
                    .filter(Boolean);

                const classes = children.filter((node) => node.type === "class");
                const functions = children.filter((node) => node.type === "function");
                const classCols = classes.length > 4 ? 3 : Math.max(1, Math.min(2, classes.length || 1));
                const functionCols = functions.length > 6 ? 4 : Math.max(1, Math.min(3, functions.length || 1));
                const classRows = classes.length ? Math.ceil(classes.length / classCols) : 0;
                const functionRows = functions.length ? Math.ceil(functions.length / functionCols) : 0;
                const classesSectionWidth = classes.length ? (classCols * classWidth) + ((classCols - 1) * cardGap) : 0;
                const functionsSectionWidth = functions.length ? (functionCols * functionWidth) + ((functionCols - 1) * cardGap) : 0;
                const clusterWidth = Math.max(fileWidth, classesSectionWidth, functionsSectionWidth) + 56;
                const classesBlockHeight = classRows ? (classRows * classHeight) + ((classRows - 1) * 18) : 0;
                const functionsBlockHeight = functionRows ? (functionRows * functionHeight) + ((functionRows - 1) * 16) : 0;
                const clusterHeight = fileHeight + 56 + classesBlockHeight + (functions.length ? 84 + functionsBlockHeight : 44) + 56;

                if (cursorX + clusterWidth > marginX + availableWidth && cursorX > marginX) {
                    cursorX = marginX;
                    cursorY = rowBottom + rowGap;
                }

                const clusterCenterX = cursorX + (clusterWidth / 2);
                const classesStartY = cursorY + 188;
                const functionsStartY = classesStartY + classesBlockHeight + (functions.length ? 104 : 0);
                positions[group.fileId] = { x: clusterCenterX, y: cursorY + (fileHeight / 2) };

                classes.forEach((node, index) => {
                    const row = Math.floor(index / classCols);
                    const col = index % classCols;
                    const rowCount = Math.min(classCols, classes.length - (row * classCols));
                    const rowWidth = (rowCount * classWidth) + ((rowCount - 1) * cardGap);
                    const rowStartX = clusterCenterX - (rowWidth / 2);
                    positions[node.id] = {
                        x: rowStartX + (col * (classWidth + cardGap)) + (classWidth / 2),
                        y: classesStartY + (row * (classHeight + 26))
                    };
                });

                functions.forEach((node, index) => {
                    const row = Math.floor(index / functionCols);
                    const col = index % functionCols;
                    const rowCount = Math.min(functionCols, functions.length - (row * functionCols));
                    const rowWidth = (rowCount * functionWidth) + ((rowCount - 1) * cardGap);
                    const rowStartX = clusterCenterX - (rowWidth / 2);
                    positions[node.id] = {
                        x: rowStartX + (col * (functionWidth + cardGap)) + (functionWidth / 2),
                        y: functionsStartY + (row * (functionHeight + 22))
                    };
                });

                cursorX += clusterWidth + clusterGap;
                rowBottom = Math.max(rowBottom, cursorY + clusterHeight);
            });

            viewModel.nodes.forEach((node, index) => {
                if (!positions[node.id]) {
                    positions[node.id] = {
                        x: marginX + 140 + ((index % 4) * 240),
                        y: rowBottom + 120 + (Math.floor(index / 4) * 80)
                    };
                }
            });

            return {
                positions,
                height: Math.max(760, rowBottom + 80)
            };
        }

        function EmptyState({ title, body }) {
            return (
                <div className="rounded-3xl border border-dashed border-line bg-white p-8 text-center shadow-soft">
                    <h3 className="text-lg font-semibold text-slate-900">{title}</h3>
                    <p className="mt-2 text-sm leading-6 text-mute">{body}</p>
                </div>
            );
        }

        function GraphViewer({ graph }) {
            const containerRef = useRef(null);
            const cyRef = useRef(null);
            const shellRef = useRef(null);
            const viewModel = useMemo(() => buildGraphViewModel(graph), [graph]);
            const [viewportWidth, setViewportWidth] = useState(1500);
            const [selectedNodeId, setSelectedNodeId] = useState(null);
            const graphLayout = useMemo(() => buildGraphLayout(viewModel, viewportWidth), [viewModel, viewportWidth]);

            useEffect(() => {
                if (!shellRef.current) return undefined;
                const updateSize = () => setViewportWidth(shellRef.current?.clientWidth || 1500);
                updateSize();
                const observer = typeof ResizeObserver !== "undefined" ? new ResizeObserver(updateSize) : null;
                if (observer) observer.observe(shellRef.current);
                window.addEventListener("resize", updateSize);
                return () => {
                    window.removeEventListener("resize", updateSize);
                    if (observer) observer.disconnect();
                };
            }, []);

            useEffect(() => {
                if (!viewModel.nodes.length) {
                    setSelectedNodeId(null);
                    return;
                }
                setSelectedNodeId((current) => current && viewModel.nodeLookup.has(current) ? current : (viewModel.files[0]?.id || viewModel.nodes[0]?.id || null));
            }, [viewModel]);

            useEffect(() => {
                if (!containerRef.current || !window.cytoscape || !viewModel.nodes.length) return undefined;

                const cy = window.cytoscape({
                    container: containerRef.current,
                    elements: [
                        ...viewModel.nodes.map((node) => ({ data: { id: node.id, label: node.displayLabel, type: node.type }, position: graphLayout.positions[node.id] })),
                        ...viewModel.edges.map((edge) => ({ data: { id: edge.id, source: edge.source, target: edge.target, edgeType: edge.type } }))
                    ],
                    layout: {
                        name: "preset",
                        animate: false,
                        fit: true,
                        padding: 72
                    },
                    style: [
                        { selector: "node", style: { label: "data(label)", "font-size": 12, color: "#0f172a", "text-wrap": "wrap", "text-max-width": 124, "text-valign": "center", "text-halign": "center", "border-width": 2, "border-color": "#cbd5e1", "background-color": "#e2e8f0", width: 60, height: 60, padding: "10px" } },
                        { selector: 'node[type = "file"]', style: { shape: "round-rectangle", width: 240, height: 82, "background-color": "#dbeafe", "border-color": "#60a5fa", "font-size": 13, "font-weight": 700, color: "#1e3a8a", "text-max-width": 200 } },
                        { selector: 'node[type = "class"]', style: { shape: "round-rectangle", width: 176, height: 56, "background-color": "#ede9fe", "border-color": "#8b5cf6", color: "#5b21b6", "font-size": 12, "text-max-width": 142 } },
                        { selector: 'node[type = "function"]', style: { shape: "round-rectangle", width: 136, height: 42, "background-color": "#fff1e6", "border-color": "#f97316", color: "#9a3412", "font-size": 11, "text-max-width": 110 } },
                        { selector: "node:selected", style: { "border-width": 4, "border-color": "#0f172a" } },
                        { selector: "edge", style: { width: 2.4, "line-color": "#cbd5e1", "target-arrow-color": "#cbd5e1", "target-arrow-shape": "triangle", "curve-style": "bezier", opacity: 0.92 } },
                        { selector: 'edge[edgeType = "CALLS"]', style: { width: 2.6, "line-color": "#c084fc", "target-arrow-color": "#c084fc", "line-style": "dashed" } },
                        { selector: 'edge[edgeType = "INHERITS"]', style: { width: 2.6, "line-style": "dashed", "line-color": "#34d399", "target-arrow-color": "#34d399" } }
                    ]
                });

                cy.minZoom(0.55);
                cy.maxZoom(1.8);
                cy.fit(cy.elements(), 72);
                cy.on("tap", "node", (event) => setSelectedNodeId(event.target.id()));
                cyRef.current = cy;
                return () => { cyRef.current = null; cy.destroy(); };
            }, [viewModel, graphLayout]);

            useEffect(() => {
                if (!cyRef.current || !selectedNodeId) return;
                cyRef.current.elements().unselect();
                const node = cyRef.current.$id(selectedNodeId);
                if (node.length) {
                    node.select();
                    cyRef.current.center(node);
                }
            }, [selectedNodeId]);

            if (!(graph?.nodes || []).length) {
                return <EmptyState title="Knowledge graph not available" body="Run Analyze from the dashboard to populate the graph for this page." />;
            }

            const selectedNode = selectedNodeId ? viewModel.nodeLookup.get(selectedNodeId) : null;
            const selectedRelations = selectedNodeId ? (viewModel.relationsByNode.get(selectedNodeId) || []) : [];

            return (
                <div className="space-y-4">
                    <div className="grid gap-3 md:grid-cols-4">
                        <div className="rounded-2xl border border-blue-200 bg-blue-50 px-4 py-3"><div className="text-xs font-semibold uppercase tracking-[0.14em] text-blue-700">Files</div><div className="mt-2 text-2xl font-semibold text-blue-950">{viewModel.stats.fileCount}</div></div>
                        <div className="rounded-2xl border border-violet-200 bg-violet-50 px-4 py-3"><div className="text-xs font-semibold uppercase tracking-[0.14em] text-violet-700">Classes</div><div className="mt-2 text-2xl font-semibold text-violet-950">{viewModel.stats.classCount}</div></div>
                        <div className="rounded-2xl border border-orange-200 bg-orange-50 px-4 py-3"><div className="text-xs font-semibold uppercase tracking-[0.14em] text-orange-700">Functions</div><div className="mt-2 text-2xl font-semibold text-orange-950">{viewModel.stats.functionCount}</div></div>
                        <div className="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3"><div className="text-xs font-semibold uppercase tracking-[0.14em] text-slate-600">Focused View</div><div className="mt-2 text-sm leading-6 text-slate-700">Showing {viewModel.stats.shownNodes} nodes and {viewModel.stats.shownEdges} relationships.</div></div>
                    </div>

                    <div className="rounded-3xl border border-line bg-white p-5 shadow-soft">
                        <div className="flex flex-wrap gap-2">
                            {viewModel.files.map((file) => (
                                <button key={file.id} type="button" onClick={() => setSelectedNodeId(file.id)} className={classNames("rounded-full border px-3 py-1.5 text-sm transition", selectedNodeId === file.id ? "border-blue-600 bg-blue-600 text-white" : "border-blue-200 bg-blue-50 text-blue-800 hover:border-blue-300")}>
                                    {file.label}
                                </button>
                            ))}
                        </div>
                        <p className="mt-4 text-sm leading-6 text-mute">This architecture view hides {viewModel.stats.hiddenImports} import node(s) and {viewModel.stats.hiddenVariables} variable node(s) so the graph stays readable.</p>
                    </div>

                    <div ref={shellRef} className="w-full">
                        <div ref={containerRef} className="w-full rounded-3xl border border-line bg-slate-50 shadow-soft" style={{ height: `${graphLayout.height}px` }} />
                    </div>

                    <div className="grid gap-4 lg:grid-cols-[260px_minmax(0,1fr)]">
                        <div className="rounded-3xl border border-line bg-white p-5 shadow-soft">
                            <div className="text-xs font-semibold uppercase tracking-[0.16em] text-mute">Legend</div>
                            <div className="mt-4 space-y-3 text-sm text-slate-700">
                                <div className="flex items-center gap-3"><span className="h-4 w-7 rounded-md border border-blue-400 bg-blue-200" /><span>Files</span></div>
                                <div className="flex items-center gap-3"><span className="h-4 w-7 rounded-md border border-violet-500 bg-violet-200" /><span>Classes</span></div>
                                <div className="flex items-center gap-3"><span className="h-4 w-4 rounded-full border border-orange-500 bg-orange-200" /><span>Functions</span></div>
                            </div>
                        </div>

                        <div className="rounded-3xl border border-line bg-white p-5 shadow-soft">
                            <div className="text-xs font-semibold uppercase tracking-[0.16em] text-mute">Selection</div>
                            {selectedNode ? (
                                <div className="mt-4 space-y-4">
                                    <div>
                                        <div className="text-lg font-semibold text-slate-900">{selectedNode.label}</div>
                                        <div className="mt-1 text-sm text-mute">{selectedNode.metaLabel || "No path metadata available."}</div>
                                    </div>
                                    <div className="flex flex-wrap gap-2">
                                        <span className="rounded-full bg-slate-100 px-3 py-1 text-xs font-medium uppercase tracking-[0.14em] text-slate-700">{selectedNode.type}</span>
                                        <span className="rounded-full bg-slate-100 px-3 py-1 text-xs font-medium text-slate-700">{selectedRelations.length} linked nodes</span>
                                    </div>
                                    <div className="grid gap-2 md:grid-cols-2">
                                        {selectedRelations.slice(0, 8).map((relation, index) => (
                                            <button key={`${relation.nodeId}-${index}`} type="button" onClick={() => setSelectedNodeId(relation.nodeId)} className="flex w-full items-center justify-between rounded-2xl border border-line bg-slate-50 px-3 py-2 text-left text-sm hover:border-slate-300 hover:bg-white">
                                                <span className="truncate text-slate-700">{relation.label}</span>
                                                <span className="ml-3 rounded-full bg-white px-2 py-1 text-[11px] font-semibold uppercase tracking-[0.12em] text-slate-500">{relation.type}</span>
                                            </button>
                                        ))}
                                        {!selectedRelations.length && <p className="text-sm text-mute">No visible relationships for this node in the focused architecture view.</p>}
                                    </div>
                                </div>
                            ) : <p className="mt-4 text-sm text-mute">Select a file, class, or function to inspect its visible relationships.</p>}
                        </div>
                    </div>
                </div>
            );
        }

        function AstNode({ label, value, depth = 0 }) {
            if (Array.isArray(value)) {
                return (
                    <details className="rounded-xl border border-line bg-white p-3">
                        <summary className="cursor-pointer text-sm font-medium text-slate-800">{label} ({value.length})</summary>
                        <div className="mt-3 space-y-2 pl-4">
                            {value.map((item, index) => <AstNode key={`${label}-${index}`} label={`${label.slice(0, -1) || "item"} ${index + 1}`} value={item} depth={depth + 1} />)}
                        </div>
                    </details>
                );
            }

            if (value && typeof value === "object") {
                return (
                    <details className="rounded-xl border border-line bg-white p-3" open={depth === 0}>
                        <summary className="cursor-pointer text-sm font-medium text-slate-800">{label}</summary>
                        <div className="mt-3 space-y-2 pl-4">
                            {Object.entries(value).map(([key, nestedValue]) => <AstNode key={`${label}-${key}`} label={key} value={nestedValue} depth={depth + 1} />)}
                        </div>
                    </details>
                );
            }

            return <div className="rounded-xl border border-line bg-white px-3 py-2 text-sm text-slate-700"><span className="font-medium text-slate-900">{label}:</span> {String(value ?? "None")}</div>;
        }

        function App() {
            const params = useMemo(() => new URLSearchParams(window.location.search), []);
            const [view, setView] = useState(params.get("view") === "ast" ? "ast" : "kg");
            const [analysisData, setAnalysisData] = useState(null);
            const [loading, setLoading] = useState(false);
            const [githubCloneStatus, setGithubCloneStatus] = useState("idle");
            const [errorMessage, setErrorMessage] = useState("");
            const uploadedSource = useMemo(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                return saved ? JSON.parse(saved) : null;
            }, []);
            const githubCloneMeta = useMemo(() => {
                if (githubCloneStatus === "cloning") return { label: "Cloning", tone: "bg-amber-100 text-amber-700" };
                if (githubCloneStatus === "ready") return { label: "Clone complete", tone: "bg-emerald-100 text-emerald-700" };
                if (githubCloneStatus === "error") return { label: "Clone failed", tone: "bg-rose-100 text-rose-700" };
                if (uploadedSource?.type === "github") return { label: "Pending clone", tone: "bg-slate-100 text-slate-700" };
                return null;
            }, [githubCloneStatus, uploadedSource]);

            function buildCodebaseSourcePayload(source = uploadedSource) {
                if (!source) return null;
                if (source.type === "github") {
                    return {
                        type: "github",
                        repo_url: source.repoUrl,
                        branch: source.branch || "main"
                    };
                }
                return {
                    type: "local",
                    path: source.serverPath
                };
            }

            function getAnalysisCacheKey(source = uploadedSource) {
                if (!source) return "";
                if (source.type === "github") {
                    return `github:${source.repoUrl || ""}#${source.branch || "main"}`;
                }
                return `local:${source.serverPath || ""}`;
            }

            useEffect(() => {
                window.history.replaceState({}, "", `/analysis?view=${view}`);
            }, [view]);

            useEffect(() => {
                const cached = localStorage.getItem(ANALYSIS_CACHE_KEY);
                if (!cached) return;
                try {
                    const parsed = JSON.parse(cached);
                    if (parsed?.sourceKey && parsed.sourceKey === getAnalysisCacheKey(uploadedSource) && parsed.data) {
                        setAnalysisData(parsed.data);
                    }
                } catch (error) {
                    localStorage.removeItem(ANALYSIS_CACHE_KEY);
                }
            }, [uploadedSource]);

            useEffect(() => {
                if ((!analysisData || !hasArchitectureData(analysisData)) && uploadedSource) {
                    refreshAnalysis();
                }
            }, [analysisData, uploadedSource]);

            async function refreshAnalysis() {
                const codebaseSource = buildCodebaseSourcePayload();
                if (!codebaseSource) {
                    setErrorMessage("Choose and analyze a codebase from the dashboard first.");
                    return;
                }

                setLoading(true);
                setErrorMessage("");
                if (codebaseSource.type === "github") {
                    setGithubCloneStatus("cloning");
                }
                try {
                    const response = await fetch("/analyze-codebase", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            codebase_source: codebaseSource
                        })
                    });
                    const data = await response.json().catch(() => ({}));
                    if (!response.ok) {
                        throw new Error(data.error || data.detail || "Analyze failed");
                    }
                    setAnalysisData(data);
                    if (codebaseSource.type === "github") {
                        setGithubCloneStatus("ready");
                    }
                    safeWriteAnalysisCache(getAnalysisCacheKey(uploadedSource), data, true);
                } catch (error) {
                    if (codebaseSource.type === "github") {
                        setGithubCloneStatus("error");
                    }
                    setErrorMessage(error.message);
                } finally {
                    setLoading(false);
                }
            }

            return (
                <div className="px-4 py-6 sm:px-6 lg:px-8">
                    <div className="mx-auto max-w-[1920px] space-y-6">
                        <header className="rounded-[32px] border border-line bg-white p-6 shadow-soft">
                            <div className="flex flex-wrap items-start justify-between gap-4">
                                <div>
                                    <div className="text-xs font-semibold uppercase tracking-[0.18em] text-mute">Req-to-Code</div>
                                    <h1 className="mt-2 text-3xl font-semibold text-slate-900">Architecture explorer</h1>
                                    <p className="mt-2 max-w-3xl text-sm leading-6 text-mute">Knowledge graph and semantic AST live here as optional analysis views, separate from the main dashboard.</p>
                                </div>
                                <div className="flex flex-wrap gap-3">
                                    <a href="/" className="rounded-2xl bg-slate-900 px-5 py-3 text-sm font-medium text-white">Back to Dashboard</a>
                                    <button type="button" onClick={refreshAnalysis} className="rounded-2xl bg-slate-100 px-5 py-3 text-sm font-medium text-slate-700">{loading ? "Refreshing..." : "Refresh Analysis"}</button>
                                </div>
                            </div>
                        </header>

                        <section className="rounded-[28px] border border-line bg-white p-6 shadow-soft">
                            <div className="flex flex-wrap items-center justify-between gap-4">
                                <div>
                                    <div className="text-xs font-semibold uppercase tracking-[0.16em] text-mute">Views</div>
                                    <div className="mt-2 flex flex-wrap gap-2">
                                        <button type="button" onClick={() => setView("kg")} className={classNames("rounded-full px-4 py-2 text-sm font-medium", view === "kg" ? "bg-stageKg text-white" : "bg-slate-100 text-slate-700")}>Knowledge Graph</button>
                                        <button type="button" onClick={() => setView("ast")} className={classNames("rounded-full px-4 py-2 text-sm font-medium", view === "ast" ? "bg-stageAst text-white" : "bg-slate-100 text-slate-700")}>Semantic AST</button>
                                    </div>
                                </div>
                                <div className="rounded-2xl border border-line bg-slate-50 px-4 py-3 text-sm text-slate-700">
                                    <div className="font-medium text-slate-900">{uploadedSource?.label || "No analyzed codebase"}</div>
                                    <div className="mt-1 text-xs text-mute">
                                        {uploadedSource?.type === "github"
                                            ? `Using GitHub repo on branch ${uploadedSource.branch || "main"}.`
                                            : (uploadedSource?.serverPath ? "Using the staged dashboard codebase." : "Analyze a codebase from the dashboard first.")}
                                    </div>
                                    {githubCloneMeta && (
                                        <div className="mt-3 flex items-center justify-between gap-3">
                                            <span className="text-[11px] font-semibold uppercase tracking-[0.14em] text-mute">Clone status</span>
                                            <span className={classNames("rounded-full px-2.5 py-1 text-xs font-medium", githubCloneMeta.tone)}>{githubCloneMeta.label}</span>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </section>

                        {errorMessage ? (
                            <div className="rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700">{errorMessage}</div>
                        ) : null}

                        {!analysisData && !loading ? (
                            <EmptyState title="Analysis not available" body="Run Analyze from the dashboard, then open this page to inspect the optional KG and AST views." />
                        ) : loading && !analysisData ? (
                            <EmptyState title="Building analysis" body="Refreshing codebase analysis for the architecture explorer." />
                        ) : view === "kg" ? (
                            <GraphViewer graph={analysisData?.knowledge_graph} />
                        ) : (
                            <div className="space-y-3">
                                {(analysisData?.semantic_ast || []).length ? (
                                    analysisData.semantic_ast.slice(0, 20).map((module) => (
                                        <AstNode key={module.path || module.name} label={normalizeDisplayPath(module.path || module.name || "module")} value={module} />
                                    ))
                                ) : (
                                    <EmptyState title="AST not available" body="Run Analyze from the dashboard to build the semantic AST." />
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
